<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIENVENIDOS AL EDÉN</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background-color: #000; /* Fondo negro base */
            overflow: hidden;
            position: relative;
        }

        /* CAPA DEL VÍDEO */
        #video-fondo {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: -1; /* Al fondo */
            transition: opacity 1s ease;
        }

        /* CONTENEDOR PRINCIPAL */
        .container {
            width: 320px; text-align: center;
            background: transparent; padding: 20px;
            z-index: 10;
        }

        /* ESTILOS VISUALES */
        h1, h2 { color: #00FFFF; text-shadow: 0 0 10px rgba(0,255,255,0.5); }
        input {
            width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.6);
            color: white; outline: none;
        }
        input:focus { border-color: #00FFFF; box-shadow: 0 0 10px #00FFFF; }
        
        button { 
            padding: 12px; width: 100%; border-radius: 10px; border: none; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-cyan { background: #00FFFF; color: black; }
        .hidden { display: none; }

        /* VISTA AGENDA (NUBES) */
        #vista-agenda {
            background: rgba(255,255,255,0.9);
            border-radius: 20px; padding: 25px; color: #333;
        }
        .btn-exit { background: transparent; font-size: 24px; border: none; cursor: pointer; }
        .task-item { 
            background: white; padding: 10px; margin-top: 8px; 
            border-radius: 8px; display: flex; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* PAPELERA */
        .btn-trash {
            position: fixed; bottom: 30px; right: 30px;
            background: transparent; color: #ff4444; border: none;
            font-size: 40px; cursor: pointer; z-index: 20;
        }
    </style>
</head>
<body id="cuerpo">

    <video id="video-fondo" autoplay muted playsinline loop>
        <source src="intro.mp4" type="video/mp4">
    </video>

    <div id="vista-login" class="container">
        <h1>EDÉN</h1>
        <input type="text" id="user-in" placeholder="Usuario">
        <input type="password" id="pass-in" placeholder="Contraseña">
        <button class="btn-cyan" onclick="validarAcceso()">ENTRAR</button>
        <p style="color: #00FFFF; font-size: 12px; cursor: pointer; margin-top: 15px;" onclick="mostrarVista('vista-eden')">REGISTRARSE</p>
    </div>

    <div id="vista-eden" class="container hidden">
        <h2>REGISTRO</h2>
        <input type="text" id="user-reg" placeholder="Nuevo usuario">
        <input type="password" id="pass-reg" placeholder="Contraseña">
        <button class="btn-cyan" onclick="ejecutarRegistro()">GUARDAR</button>
        <p style="color: #ccc; font-size: 12px; cursor: pointer; margin-top: 15px;" onclick="mostrarVista('vista-login')">Volver</p>
    </div>

    <div id="vista-agenda" class="container hidden">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h3 style="color: #2196F3;">NOTAS</h3>
            <button class="btn-exit" onclick="cerrarSesion()">🚪</button>
        </div>
        <div style="display:flex; gap:5px; margin-top: 10px;">
            <input type="text" id="campo-tarea" style="color: black; background: white; border: 1px solid #ddd;" placeholder="Nueva nota...">
            <button onclick="añadirTarea()" style="width: 50px; background: #2196F3; color: white;">+</button>
        </div>
        <div id="lista-tareas" style="text-align: left; max-height: 300px; overflow-y: auto;"></div>
    </div>

    <button id="btn-borrar" class="btn-trash hidden" onclick="borrarMarcados()">🗑️</button>

    <script>
        const video = document.getElementById('video-fondo');
        const cuerpo = document.getElementById('cuerpo');
        const btnBorrar = document.getElementById('btn-borrar');

        function mostrarVista(id) {
            document.getElementById('vista-login').classList.add('hidden');
            document.getElementById('vista-eden').classList.add('hidden');
            document.getElementById('vista-agenda').classList.add('hidden');
            btnBorrar.classList.add('hidden');

            document.getElementById(id).classList.remove('hidden');
            
            if (id === 'vista-agenda') {
                video.style.opacity = '0';
                cuerpo.style.backgroundImage = "url('fondo-nubes.jpg')";
                cuerpo.style.backgroundSize = "cover";
                btnBorrar.classList.remove('hidden');
            } else {
                video.style.opacity = '1';
                cuerpo.style.backgroundImage = "none";
                video.play().catch(() => {});
            }
        }

        function validarAcceso() {
            const u = document.getElementById('user-in').value.trim();
            const p = document.getElementById('pass-in').value.trim();
            const savedPass = localStorage.getItem('user_' + u);
            if ((u === 'admin' && p === '1234') || savedPass === p) {
                mostrarVista('vista-agenda');
                cargarTareas();
            } else { alert("Error"); }
        }

        function cerrarSesion() { mostrarVista('vista-login'); }

        function ejecutarRegistro() {
            const u = document.getElementById('user-reg').value.trim();
            const p = document.getElementById('pass-reg').value.trim();
            if(u && p) {
                localStorage.setItem('user_' + u, p);
                alert("Registrado");
                mostrarVista('vista-login');
            }
        }

        function añadirTarea() {
            const input = document.getElementById('campo-tarea');
            if(input.value.trim()) {
                let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
                tareas.unshift({text: input.value.trim(), done: false}); 
                localStorage.setItem('tareas_eden', JSON.stringify(tareas));
                input.value = '';
                cargarTareas();
            }
        }

        function cargarTareas() {
            const lista = document.getElementById('lista-tareas');
            lista.innerHTML = '';
            let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
            tareas.forEach((t, i) => {
                const item = document.createElement('div');
                item.className = 'task-item';
                item.innerHTML = `
                    <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTarea(${i})">
                    <span style="margin-left:10px; ${t.done ? 'text-decoration:line-through; color:gray;' : ''}">${t.text}</span>`;
                lista.appendChild(item);
            });
        }

        function toggleTarea(i) {
            let tareas = JSON.parse(localStorage.getItem('tareas_eden'));
            tareas[i].done = !tareas[i].done;
            localStorage.setItem('tareas_eden', JSON.stringify(tareas));
            cargarTareas();
        }

        function borrarMarcados() {
            let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
            tareas = tareas.filter(t => !t.done);
            localStorage.setItem('tareas_eden', JSON.stringify(tareas));
            cargarTareas();
        }

        mostrarVista('vista-login');
    </script>
</body>
</html>
