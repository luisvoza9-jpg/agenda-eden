<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIENVENIDOS AL EDÉN</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background-image: url('fondo-nubes.jpg');
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        .container {
            width: 380px; 
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* === TÍTULO MODO PELÍCULA === */
        h1 { 
            color: #00FFFF; margin-bottom: 25px; font-size: 28px; 
            text-shadow: 0 0 15px #00FFFF;
            text-align: center;
            display: flex; flex-direction: column; align-items: center;
            letter-spacing: 2px;
            font-weight: bold;
            min-height: 4em; 
        }

        .frase-neon {
            color: #00FFFF; font-size: 14px; text-shadow: 0 0 10px #00FFFF;
            display: block; margin-top: 20px; text-align: center;
        }

        input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px;
            border: 1px solid #00FFFF; background: rgba(0, 0, 0, 0.6);
            color: white; font-size: 16px; outline: none; text-align: center;
            height: 45px;
        }

        #vista-agenda {
            background: transparent !important;
            padding: 20px;
            position: relative;
        }

        /* === PUERTA EXIT (DONDE SEÑALASTE) === */
        .btn-exit-fixed {
            position: absolute; top: -10px; right: 0px; 
            color: #ff4444; cursor: pointer; border: none; background: none;
            display: flex; flex-direction: column; align-items: center;
            z-index: 100; transition: 0.3s;
        }
        .btn-exit-fixed:hover { transform: scale(1.1); color: #ff0000; filter: drop-shadow(0 0 5px #ff4444); }
        .door-icon { font-size: 30px; }
        .exit-text { font-size: 10px; font-weight: bold; margin-top: -2px; }

        .task-input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        #campo-tarea { text-align: left; padding-left: 15px; flex: 1; margin: 0; }
        .btn-blue { background: #00FFFF; color: black; width: 60px; font-size: 20px; border-radius: 10px; border: none; cursor: pointer; height: 45px; display: flex; justify-content: center; align-items: center; }

        .task-list { text-align: left; margin-top: 20px; max-height: 300px; overflow-y: auto; position: relative; }
        .task-item { 
            background: rgba(0, 0, 0, 0.5); margin-bottom: 10px; padding: 15px;
            border-radius: 10px; display: flex; align-items: center;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }
        .task-text { flex: 1; margin-left: 10px; color: white; font-size: 16px; }

        /* === PAPELERA (PULSO ROJO) === */
        .btn-trash-central {
            position: fixed; bottom: 30px; right: 30px;
            background: none; color: #ff4444; font-size: 50px; border: none; 
            filter: drop-shadow(0 0 10px #ff4444); cursor: pointer; z-index: 100;
        }

        .hidden { display: none !important; }

        /* === ANIMACIÓN DE VUELO REAL (CORREGIDA) === */
        @keyframes arrugar {
            0% { transform: scale(1); }
            100% { transform: scale(0.2); border-radius: 50%; background: #fff; }
        }

        @keyframes volarALaBasura {
            0% { transform: scale(0.2) translate(0, 0); opacity: 1; }
            100% { transform: scale(0) translate(0, 70vh); opacity: 0; } /* Vuelo largo hacia la papelera */
        }

        .arrugando {
            animation: arrugar 0.4s forwards, volarALaBasura 0.5s 0.4s forwards;
            position: relative; z-index: 20;
        }
        .borrando { overflow: visible; }
    </style>
</head>
<body>

    <div id="pantalla-oscura" class="overlay"></div>

    <div id="vista-login" class="container">
        <h1 id="titulo-eden"></h1>
        <input type="text" id="user-in" placeholder="Usuario">
        <input type="password" id="pass-in" placeholder="Contraseña">
        <button style="background:#00FFFF; color:black; width:100%; height:45px; border-radius:10px; font-weight:bold; border:none; cursor:pointer;" onclick="validarAcceso()">ENTRAR</button>
        <span class="frase-neon">¡Un paraíso para tus secretos te espera en el edén!</span>
        <p style="cursor:pointer; color:#ccc; font-size: 12px; margin-top: 20px;" onclick="mostrarVista('vista-eden')">Registrarse</p>
    </div>

    <div id="vista-agenda" class="container hidden">
        <button class="btn-exit-fixed" onclick="cerrarSesion()">
            <span class="door-icon">🚪</span>
            <span class="exit-text">EXIT</span>
        </button>
        <h3 style="color:#00FFFF; text-align:left; margin-bottom:15px;">MIS NOTAS</h3>
        <div class="task-input-group">
            <input type="text" id="campo-tarea" placeholder="Escribe algo...">
            <button class="btn-blue" onclick="añadirTarea()">+</button>
        </div>
        <div id="lista-tareas" class="task-list"></div>
    </div>

    <button class="btn-trash-central hidden" id="btn-borrar" onclick="borrarMarcados()">🗑️</button>

    <script>
        const btnBorrar = document.getElementById('btn-borrar');
        const overlay = document.getElementById('pantalla-oscura');
        const listaTareas = document.getElementById('lista-tareas');
        const tituloEden = document.getElementById('titulo-eden');

        const lineasTexto = ["BIENVENIDOS", "AL", "EDÉN"];
        let timerEscritura;

        function animarTitulo() {
            tituloEden.innerHTML = "";
            let l = 0, c = 0;
            clearInterval(timerEscritura);
            timerEscritura = setInterval(() => {
                if (l < lineasTexto.length) {
                    if (c === 0) tituloEden.innerHTML += "<span></span>";
                    let spans = tituloEden.querySelectorAll("span");
                    spans[l].innerText += lineasTexto[l][c];
                    c++;
                    if (c >= lineasTexto[l].length) { l++; c = 0; if(l < lineasTexto.length) tituloEden.innerHTML += "<br>"; }
                } else { clearInterval(timerEscritura); }
            }, 100);
        }

        function mostrarVista(id) {
            document.getElementById('vista-login').classList.add('hidden');
            document.getElementById('vista-agenda').classList.add('hidden');
            btnBorrar.classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
            if (id === 'vista-login') animarTitulo();
            if (id === 'vista-agenda') { overlay.classList.add('hidden'); btnBorrar.classList.remove('hidden'); }
            else { overlay.classList.remove('hidden'); }
        }

        function validarAcceso() {
            const u = document.getElementById('user-in').value.trim();
            const p = document.getElementById('pass-in').value.trim();
            if ((u === 'admin' && p === '1234')) { mostrarVista('vista-agenda'); cargarTareas(); }
            else { alert("Error"); }
        }

        function cerrarSesion() { mostrarVista('vista-login'); }

        function añadirTarea() {
            const input = document.getElementById('campo-tarea');
            if(input.value.trim()) {
                let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
                tareas.unshift({text: input.value.trim(), done: false}); 
                localStorage.setItem('tareas_eden', JSON.stringify(tareas));
                input.value = '';
                cargarTareas();
            }
        }

        function cargarTareas() {
            listaTareas.innerHTML = '';
            let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
            tareas.forEach((t, i) => {
                const item = document.createElement('div');
                item.className = 'task-item';
                item.id = `nota-${i}`; 
                item.innerHTML = `<input type="checkbox" style="width:20px; cursor:pointer;" ${t.done ? 'checked' : ''} onchange="toggleTarea(${i})"><div class="task-text" style="${t.done ? 'text-decoration:line-through; opacity:0.5;' : ''}">${t.text}</div>`;
                listaTareas.appendChild(item);
            });
        }

        function toggleTarea(i) {
            let tareas = JSON.parse(localStorage.getItem('tareas_eden'));
            tareas[i].done = !tareas[i].done;
            localStorage.setItem('tareas_eden', JSON.stringify(tareas));
            cargarTareas();
        }

        function borrarMarcados() {
            let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
            const indices = tareas.reduce((acc, t, i) => { if (t.done) acc.push(i); return acc; }, []);
            if (indices.length === 0) return;
            listaTareas.classList.add('borrando');
            indices.forEach(idx => document.getElementById(`nota-${idx}`).classList.add('arrugando'));
            setTimeout(() => {
                tareas = tareas.filter(t => !t.done);
                localStorage.setItem('tareas_eden', JSON.stringify(tareas));
                cargarTareas();
                listaTareas.classList.remove('borrando');
            }, 900);
        }

        mostrarVista('vista-login');
    </script>
</body>
</html>
