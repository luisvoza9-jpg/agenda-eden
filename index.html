<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agenda Edén | Juego de Ladrillos y Chat de Luisvoza9</title>
    <link rel="icon" type="image/png" href="icono.png">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icono.png">
    <meta name="theme-color" content="#00FFFF">

    <style>
        /* ESTILO ORIGINAL MANTENIDO */
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif; background-image: url('fondo-nubes.jpg');
            background-size: cover; background-position: center; overflow: hidden; color: white;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 1; }
        .container { width: 380px; text-align: center; position: relative; z-index: 10; }
        h1 { color: #00FFFF; margin-bottom: 20px; font-size: 32px; text-shadow: 0 0 15px #00FFFF; display: flex; flex-direction: column; align-items: center; letter-spacing: 2px; font-weight: bold; line-height: 1.1; min-height: 110px; }
        h1 span { display: block; width: 100%; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #00FFFF; background: rgba(0, 0, 0, 0.7); color: white; font-size: 16px; outline: none; text-align: center; }
        .btn-exit-fixed { position: fixed; top: 25px; right: 25px; color: #ff4444; cursor: pointer; border: none; background: none; display: flex; flex-direction: column; align-items: center; z-index: 1000; }
        .btn-settings-fixed { position: fixed; top: 25px; left: 25px; color: #fff; text-shadow: 0 0 10px #00FFFF; cursor: pointer; border: none; background: none; display: flex; flex-direction: column; align-items: center; z-index: 1000; transition: 0.3s; }
        .task-input-group { display: flex; gap: 10px; margin-top: 10px; align-items: center; }
        .btn-blue { background: #00FFFF; color: black; width: 55px; font-size: 24px; border-radius: 10px; border: none; cursor: pointer; height: 45px; flex-shrink: 0; }
        .task-list { text-align: left; margin-top: 20px; max-height: 250px; overflow-y: auto; }
        .task-item { background: rgba(0, 0, 0, 0.6); margin-bottom: 8px; padding: 12px; border-radius: 10px; display: flex; align-items: center; border: 1px solid rgba(0, 255, 255, 0.2); gap: 10px; }
        .task-text { flex: 1; color: white; word-break: break-word; font-size: 14px; }
        .btn-trash-central { position: fixed; bottom: 30px; right: 30px; background: none; color: #ff4444; font-size: 50px; border: none; filter: drop-shadow(0 0 10px #ff4444); cursor: pointer; z-index: 100; }
        .hidden { display: none !important; }
        .settings-card { background: rgba(0,0,0,0.85); padding: 20px; border-radius: 20px; border: 1px solid #00FFFF; text-align: left; position: relative; }
        .btn-close-settings { position: absolute; top: 10px; right: 15px; color: #ff4444; font-size: 24px; cursor: pointer; }
        .shop-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .shop-item { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; text-align: center; border: 1px solid rgba(0,255,255,0.3); cursor: pointer; }
        .btn-shop-flotante { position: fixed; bottom: 30px; left: 150px; background: none; color: #FFD700; font-size: 40px; border: none; cursor: pointer; z-index: 101; display: flex; flex-direction: column; align-items: center; }
        .btn-chat-flotante { position: fixed; bottom: 30px; left: 210px; background: none; color: #00FF00; font-size: 40px; border: none; cursor: pointer; z-index: 101; display: flex; flex-direction: column; align-items: center; }
        .btn-game-flotante { position: fixed; bottom: 30px; left: 30px; background: none; color: #00FFFF; font-size: 40px; border: none; cursor: pointer; z-index: 101; }
        .btn-rank-flotante { position: fixed; bottom: 30px; left: 90px; background: none; color: #FFD700; font-size: 40px; border: none; cursor: pointer; z-index: 101; }
        #vista-juego { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('fondo-nubes.jpg'); background-size: cover; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #gameCanvas { border: 3px solid #00FFFF; background: rgba(0, 0, 0, 0.9); box-shadow: 0 0 30px #00FFFF; }
        .menu-eden { position: absolute; background: rgba(0,0,0,0.95); border: 2px solid #00FFFF; padding: 30px; border-radius: 20px; text-align: center; z-index: 1010; width: 340px; }
        .game-btn-neon { background: none; border: 1px solid #00FFFF; color: #00FFFF; padding: 10px 20px; margin: 10px auto; border-radius: 10px; cursor: pointer; width: 100%; }
        #avatar-preview { width: 90px; height: 90px; border-radius: 50%; border: 2px solid #00FFFF; overflow: hidden; background: #000; display: flex; justify-content: center; align-items: center; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="pantalla-oscura" class="overlay"></div>

    <button id="settings-btn" class="btn-settings-fixed hidden" onclick="mostrarVista('vista-ajustes')">⚙️</button>
    <button id="exit-btn" class="btn-exit-fixed hidden" onclick="cerrarSesion()">🚪<span style="font-size:10px">EXIT</span></button>
    <button class="btn-trash-central hidden" id="btn-borrar" onclick="borrarMarcados()">🗑️</button>
    <button id="game-btn" class="btn-game-flotante hidden" onclick="abrirMenuDificultad()">🎮</button>
    <button id="rank-btn" class="btn-rank-flotante hidden" onclick="abrirRanking()">🏆</button>
    <button id="shop-btn" class="btn-shop-flotante hidden" onclick="mostrarVista('vista-tienda')">🏠</button>
    <button id="chat-btn" class="btn-chat-flotante hidden" onclick="mostrarVista('vista-chat')">💬</button>

    <div id="vista-login" class="container">
        <h1 id="titulo-eden"></h1>
        <input type="text" id="user-in" placeholder="Usuario">
        <input type="password" id="pass-in" placeholder="Contraseña">
        <button style="background:#00FFFF; width:100%; height:45px; border-radius:10px; cursor:pointer;" onclick="validarAcceso()">ENTRAR</button>
        <p style="cursor:pointer; color:#ccc; margin-top: 20px;" onclick="mostrarVista('vista-eden')">Registrarse</p>
    </div>

    <div id="vista-eden" class="container hidden">
        <h2 style="color:#00FFFF">REGISTRO</h2>
        <input type="text" id="user-reg" placeholder="Nuevo usuario">
        <input type="password" id="pass-reg" placeholder="Contraseña">
        <input type="number" id="age-reg" placeholder="Edad">
        <button style="background:#00FFFF; width:100%; height:45px; border-radius:10px;" onclick="ejecutarRegistro()">GUARDAR</button>
        <p style="cursor:pointer; color:#ccc; margin-top:20px;" onclick="mostrarVista('vista-login')">Volver</p>
    </div>

    <div id="vista-agenda" class="container hidden">
        <h3 style="color:#00FFFF; text-align:left;">MIS NOTAS</h3>
        <div class="task-input-group">
            <input type="text" id="campo-tarea" placeholder="Escribe algo..." style="text-align:left;">
            <button class="btn-blue" onclick="añadirTarea()">+</button>
        </div>
        <div id="lista-tareas" class="task-list"></div>
    </div>

    <div id="vista-ajustes" class="container hidden">
        <div class="settings-card">
            <div class="btn-close-settings" onclick="mostrarVista('vista-agenda')">✖</div>
            <h2 style="color:#00FFFF; text-align:center;">PERFIL</h2>
            <div style="display: flex; flex-direction: column; align-items: center;">
                <div id="avatar-preview"><span id="avatar-img" style="font-size: 45px;">👤</span></div>
                <div style="display: flex; gap: 8px;">
                    <button onclick="cambiarAvatar('🥷')">🥷</button>
                    <button onclick="cambiarAvatar('🤖')">🤖</button>
                    <button onclick="cambiarAvatar('👽')">👽</button>
                </div>
            </div>
            <p id="perfil-nombre"></p>
            <p id="perfil-puntos"></p>
        </div>
    </div>

    <div id="vista-tienda" class="container hidden">
        <div class="settings-card">
            <div class="btn-close-settings" onclick="mostrarVista('vista-agenda')">✖</div>
            <h2 style="color:#FFD700; text-align:center;">SHOP</h2>
            <span id="shop-balance"></span>
            <div class="shop-grid">
                <div class="shop-item" onclick="comprar('vida', 1)">❤️ x1 (5000 pts)</div>
            </div>
        </div>
    </div>

    <div id="vista-chat" class="container hidden">
        <div class="settings-card">
            <div class="btn-close-settings" onclick="mostrarVista('vista-agenda')">✖</div>
            <h2 style="color:#00FF00; text-align:center;">CHAT</h2>
            <div id="chat-box" style="height:200px; overflow-y:auto; background:rgba(0,0,0,0.5); padding:10px;"></div>
            <input type="text" id="chat-input" placeholder="Mensaje...">
            <button onclick="enviarMensaje()">Enviar</button>
        </div>
    </div>

    <div id="vista-juego" class="hidden">
        <button class="btn-game-return" onclick="salirDelJuego()">🚪</button>
        <div id="game-score" style="color:#FFD700; font-size:20px;">€Eden€: 0</div>
        <canvas id="gameCanvas" width="350" height="500"></canvas>
        <div id="difficulty-menu" class="menu-eden hidden">
            <button class="game-btn-neon" onclick="iniciarJuegoEden('terrestre')">Terrestre</button>
            <button class="game-btn-neon" onclick="iniciarJuegoEden('semidios')">Semidios</button>
            <button class="game-btn-neon" onclick="iniciarJuegoEden('eden')">Edén</button>
        </div>
        <div id="game-over-menu" class="menu-eden hidden">
            <h2>FIN</h2>
            <button class="game-btn-neon" onclick="abrirMenuDificultad()">Reintentar</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCod7qKXcefhTqa40EVWbl32dygU9G10Aw",
            authDomain: "edengame-5a40c.firebaseapp.com",
            databaseURL: "https://edengame-5a40c-default-rtdb.firebaseio.com",
            projectId: "edengame-5a40c",
            storageBucket: "edengame-5a40c.firebasestorage.app",
            messagingSenderId: "837651200703",
            appId: "1:837651200703:web:0c3e237c36e1bb37b6640a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        
        let currentUser = "";
        let userBalance = 0;
        let gameInterval;
        let masterVolume = 0.5;

        // SONIDOS
        const sonidos = { click: new Audio('click.mp3'), coin: new Audio('coin.mp3'), fail: new Audio('fail.mp3'), trash: new Audio('trash.mp3') };
        function reproducir(n) { if(sonidos[n]) { sonidos[n].volume = masterVolume; sonidos[n].play().catch(()=>{}); } }

        // --- GESTIÓN DE NOTAS (MODIFICADO PARA FIREBASE) ---
        function añadirTarea() {
            const input = document.getElementById('campo-tarea');
            if(input.value.trim() && currentUser) {
                db.ref('notas/' + currentUser).push({ text: input.value.trim(), done: false });
                input.value = '';
                reproducir('click');
            }
        }

        function cargarTareas() {
            const lista = document.getElementById('lista-tareas');
            db.ref('notas/' + currentUser).on('value', (s) => {
                lista.innerHTML = '';
                s.forEach((child) => {
                    const t = child.val();
                    const key = child.key;
                    const item = document.createElement('div'); item.className = 'task-item';
                    item.innerHTML = `
                        <input type="checkbox" ${t.done?'checked':''} onchange="toggle('${key}', ${t.done})">
                        <div class="task-text" style="${t.done?'text-decoration:line-through;opacity:0.5':''}">${t.text}</div>
                    `;
                    lista.appendChild(item);
                });
            });
        }

        function toggle(key, status) { db.ref('notas/' + currentUser + '/' + key).update({ done: !status }); }

        function borrarMarcados() {
            db.ref('notas/' + currentUser).once('value', (s) => {
                s.forEach(child => { if(child.val().done) db.ref('notas/' + currentUser + '/' + child.key).remove(); });
                reproducir('trash');
            });
        }

        // --- NAVEGACIÓN Y LOGIN ---
        function mostrarVista(id) {
            document.querySelectorAll('.container, #vista-juego').forEach(v => v.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            const botones = ['exit-btn', 'settings-btn', 'game-btn', 'rank-btn', 'shop-btn', 'chat-btn', 'btn-borrar'];
            if(['vista-login', 'vista-eden'].includes(id)) {
                botones.forEach(b => document.getElementById(b).classList.add('hidden'));
                document.getElementById('pantalla-oscura').classList.remove('hidden');
            } else {
                botones.forEach(b => document.getElementById(b).classList.remove('hidden'));
                document.getElementById('pantalla-oscura').classList.toggle('hidden', id === 'vista-agenda');
                if(id === 'vista-agenda') cargarTareas();
            }
        }

        function validarAcceso() {
            const u = document.getElementById('user-in').value.trim();
            const p = document.getElementById('pass-in').value.trim();
            db.ref('usuarios/' + u).once('value', (s) => {
                if(s.exists() && s.val().password === p) {
                    currentUser = u;
                    userBalance = s.val().saldo || 0;
                    mostrarVista('vista-agenda');
                } else { alert("Error"); }
            });
        }

        function ejecutarRegistro() {
            const u = document.getElementById('user-reg').value.trim();
            const p = document.getElementById('pass-reg').value.trim();
            if(u && p) db.ref('usuarios/' + u).set({ password: p, saldo: 0 }).then(() => mostrarVista('vista-login'));
        }

        function cerrarSesion() { currentUser = ""; mostrarVista('vista-login'); }

        // --- LÓGICA DEL JUEGO (CORREGIDA) ---
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let paddleWidth = 80, paddleX = 135, ball, bricks = [], gameActive = false, score = 0;

        // CONTROL TÁCTIL (NUEVO)
        canvas.addEventListener("touchmove", (e) => {
            if(!gameActive) return;
            e.preventDefault();
            let rect = canvas.getBoundingClientRect();
            let touchX = e.touches[0].clientX - rect.left;
            paddleX = Math.max(0, Math.min(canvas.width - paddleWidth, touchX - paddleWidth / 2));
        }, {passive: false});

        // CONTROL RATÓN
        canvas.addEventListener("mousemove", (e) => {
            if(!gameActive) return;
            let rect = canvas.getBoundingClientRect();
            paddleX = e.clientX - rect.left - paddleWidth / 2;
        });

        function iniciarJuegoEden(diff) {
            clearInterval(gameInterval); // FIX: Limpiar intervalo previo para que no acelere
            gameActive = true;
            score = 0;
            document.getElementById("game-score").innerText = "€Eden€: 0";
            document.querySelectorAll('.menu-eden').forEach(m => m.classList.add('hidden'));
            
            // Config bola según dificultad
            let vel = (diff === 'eden') ? 4 : (diff === 'semidios' ? 3 : 2.2);
            ball = { x: canvas.width/2, y: canvas.height-100, dx: vel, dy: -vel, r: 7 };
            
            // Crear ladrillos
            bricks = [];
            for(let c=0; c<6; c++) {
                bricks[c] = [];
                for(let r=0; r<5; r++) bricks[c][r] = { x: c*55+15, y: r*25+50, status: 1 };
            }
            gameInterval = setInterval(draw, 10);
        }

        function draw() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            // Ladrillos
            bricks.forEach(col => col.forEach(b => {
                if(b.status === 1) {
                    ctx.fillStyle = "#FF4444"; ctx.fillRect(b.x, b.y, 50, 20);
                    if(ball.x > b.x && ball.x < b.x+50 && ball.y > b.y && ball.y < b.y+20) {
                        ball.dy *= -1; b.status = 0; score++;
                        document.getElementById("game-score").innerText = "€Eden€: " + score;
                    }
                }
            }));
            // Pala
            ctx.fillStyle = "#00FFFF"; ctx.fillRect(paddleX, canvas.height-40, paddleWidth, 10);
            // Bola
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fillStyle = "white"; ctx.fill(); ctx.closePath();
            
            if(ball.x + ball.dx > canvas.width-ball.r || ball.x + ball.dx < ball.r) ball.dx *= -1;
            if(ball.y + ball.dy < ball.r) ball.dy *= -1;
            else if(ball.y + ball.dy > canvas.height-40) {
                if(ball.x > paddleX && ball.x < paddleX + paddleWidth) ball.dy *= -1;
                else if(ball.y > canvas.height) { 
                    gameActive = false; clearInterval(gameInterval); 
                    document.getElementById('game-over-menu').classList.remove('hidden');
                    // Guardar saldo
                    db.ref('usuarios/' + currentUser).update({ saldo: userBalance + score });
                    userBalance += score;
                }
            }
            ball.x += ball.dx; ball.y += ball.dy;
        }

        function abrirMenuDificultad() { 
            mostrarVista('vista-juego'); 
            document.getElementById('difficulty-menu').classList.remove('hidden'); 
            document.getElementById('game-over-menu').classList.add('hidden');
        }
        function salirDelJuego() { clearInterval(gameInterval); gameActive = false; mostrarVista('vista-agenda'); }

        // Iniciar App
        mostrarVista('vista-login');
    </script>
</body>
</html>
