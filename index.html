<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA EDEN</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 350px; text-align: center; background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { color: #2196F3; }
        .eden-title { color: #00FFFF; font-style: italic; font-size: 30px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 95%; padding: 10px; margin: 10px 0; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .btn-blue { background: #2196F3; color: white; }
        .btn-cyan { background: #00FFFF; color: black; }
        .btn-red { background: #f44336; color: white; width: auto; padding: 5px 15px; }
        .hidden { display: none; }
        .task-list { text-align: left; max-height: 300px; overflow-y: auto; margin-top: 15px; }
        .task-item { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="vista-login" class="container">
        <h1>INICIO DE SESIÓN</h1>
        <input type="text" id="user-in" placeholder="Usuario">
        <input type="password" id="pass-in" placeholder="Contraseña">
        <button class="btn-blue" onclick="validarAcceso()">ENTRAR</button>
        <p style="cursor:pointer; color:#2196F3" onclick="mostrarVista('vista-eden')">¿No tienes cuenta? REGÍSTRATE AQUÍ</p>
    </div>

    <div id="vista-eden" class="container hidden">
        <h1 class="eden-title">BIENVENIDOS AL EDEN</h1>
        <h3>REGÍSTRATE</h3>
        <input type="text" id="user-reg" placeholder="Nuevo Usuario">
        <input type="password" id="pass-reg" placeholder="Nueva Contraseña">
        <button class="btn-cyan" onclick="ejecutarRegistro()">CREAR CUENTA</button>
        <p style="cursor:pointer; color:#00FFFF" onclick="mostrarVista('vista-login')">Volver al Login</p>
    </div>

    <div id="vista-agenda" class="container hidden">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h2 style="color:#2196F3">MIS TAREAS</h2>
            <button class="btn-red" onclick="mostrarVista('vista-login')">SALIR</button>
        </div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="campo-tarea" placeholder="Nueva tarea...">
            <button class="btn-blue" style="width:70px" onclick="añadirTarea()">+</button>
        </div>
        <button style="background:orange; color:white" onclick="borrarMarcados()">BORRAR MARCADOS</button>
        <div id="lista-tareas" class="task-list"></div>
    </div>

    <script>
        function mostrarVista(id) {
            document.getElementById('vista-login').classList.add('hidden');
            document.getElementById('vista-eden').classList.add('hidden');
            document.getElementById('vista-agenda').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function ejecutarRegistro() {
            const u = document.getElementById('user-reg').value;
            const p = document.getElementById('pass-reg').value;
            if(u && p) {
                localStorage.setItem('user_' + u, p);
                alert("Usuario creado");
                mostrarVista('vista-login');
            }
        }

        function validarAcceso() {
            const u = document.getElementById('user-in').value;
            const p = document.getElementById('pass-in').value;
            const savedPass = localStorage.getItem('user_' + u);
            if ((u === 'admin' && p === '1234') || savedPass === p) {
                mostrarVista('vista-agenda');
                cargarTareas();
            } else { alert("Datos incorrectos"); }
        }

        function añadirTarea() {
            const input = document.getElementById('campo-tarea');
            if(input.value) {
                let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
                tareas.push({text: input.value, done: false});
                localStorage.setItem('tareas_eden', JSON.stringify(tareas));
                input.value = '';
                cargarTareas();
            }
        }

        function cargarTareas() {
            const lista = document.getElementById('lista-tareas');
            lista.innerHTML = '';
            let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
            tareas.forEach((t, i) => {
                lista.innerHTML += `<div class="task-item"><input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTarea(${i})">${t.text}</div>`;
            });
        }

        function toggleTarea(i) {
            let tareas = JSON.parse(localStorage.getItem('tareas_eden'));
            tareas[i].done = !tareas[i].done;
            localStorage.setItem('tareas_eden', JSON.stringify(tareas));
        }

        function borrarMarcados() {
            let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
            tareas = tareas.filter(t => !t.done);
            localStorage.setItem('tareas_eden', JSON.stringify(tareas));
            cargarTareas();
        }
    </script>
</body>
</html>
