<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIENVENIDOS AL EDÉN</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background-image: url('fondo-nubes.jpg');
            background-size: cover;
            background-position: center;
            overflow: hidden;
            position: relative;
        }

        /* Capa oscura para el Login/Registro */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        .container {
            width: 350px; 
            text-align: center;
            padding: 25px;
            position: relative;
            z-index: 10;
        }

        /* Títulos centrados y Neón Cyan */
        h1, h2 { 
            color: #00FFFF; margin-bottom: 20px; font-size: 28px; 
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
            text-align: center; width: 100%;
        }

        input {
            width: 90%; padding: 12px; margin: 10px auto; border-radius: 10px;
            border: 1px solid rgba(0, 255, 255, 0.3); 
            background: rgba(0, 0, 0, 0.7);
            color: white; font-size: 16px; outline: none; display: block;
            text-align: center;
        }

        input:focus { border-color: #00FFFF; box-shadow: 0 0 10px #00FFFF; }
        
        button { padding: 12px; cursor: pointer; border: none; border-radius: 10px; font-weight: bold; transition: 0.3s; }
        .btn-cyan { background: #00FFFF; color: black; width: 100%; }
        .hidden { display: none !important; }

        /* Agenda */
        #vista-agenda {
            background: rgba(255,255,255,0.95);
            border-radius: 20px; color: #333;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px; width: 380px;
        }

        /* PUERTA ROJA + EXIT PEQUEÑO */
        .btn-exit-container {
            float: right;
            display: flex; flex-direction: column; align-items: center;
            background: transparent; border: none; cursor: pointer;
            color: #ff4444; margin-top: -10px; transition: 0.3s;
            text-decoration: none;
        }
        .btn-exit-container:hover { transform: scale(1.1); color: #ff0000; filter: drop-shadow(0 0 5px #ff4444); }
        .door-icon { font-size: 26px; }
        .exit-text { font-size: 9px; font-weight: bold; margin-top: -2px; }

        #vista-agenda h3 { color: #2196F3; margin: 0; text-align: left; }
        
        .task-input-group { display: flex; gap: 5px; margin-top: 15px; }
        #campo-tarea { 
            flex: 1; margin: 0; background: white; color: #333; 
            border: 1px solid #ddd; text-align: left; 
        }
        .btn-blue { background: #2196F3; color: white; width: 50px; }

        .task-list { text-align: left; max-height: 300px; overflow-y: auto; margin-top: 20px; }
        .task-item { 
            background: white; margin-bottom: 8px; padding: 12px;
            border-radius: 10px; display: flex; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* PAPELERA NEÓN CENTRAL */
        .btn-trash-central {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: transparent; color: #ff4444; 
            font-size: 45px; border: none; cursor: pointer;
            filter: drop-shadow(0 0 10px #ff4444);
            z-index: 100; transition: 0.3s;
        }
        .btn-trash-central:hover { transform: translateX(-50%) scale(1.2); filter: drop-shadow(0 0 20px #ff0000); }
    </style>
</head>
<body>

    <div id="pantalla-oscura" class="overlay"></div>

    <div id="vista-login" class="container">
        <h1>BIENVENIDOS AL EDÉN</h1>
        <input type="text" id="user-in" placeholder="Usuario">
        <input type="password" id="pass-in" placeholder="Contraseña">
        <button class="btn-cyan" onclick="validarAcceso()">ENTRAR</button>
        <p style="cursor:pointer; color:#00FFFF; font-size: 12px; margin-top: 20px; text-shadow: 0 0 5px #00FFFF;" onclick="mostrarVista('vista-eden')">¿Eres nuevo? REGÍSTRATE</p>
    </div>

    <div id="vista-eden" class="container hidden">
        <h2>REGISTRO</h2>
        <input type="text" id="user-reg" placeholder="Nuevo usuario">
        <input type="password" id="pass-reg" placeholder="Contraseña">
        <button class="btn-cyan" onclick="ejecutarRegistro()">GUARDAR</button>
        <p style="cursor:pointer; color:#ccc; margin-top:20px; font-size: 12px;" onclick="mostrarVista('vista-login')">← Volver</p>
    </div>

    <div id="vista-agenda" class="container hidden">
        <button class="btn-exit-container" onclick="cerrarSesion()">
            <span class="door-icon">🚪</span>
            <span class="exit-text">EXIT</span>
        </button>
        <h3>MIS NOTAS</h3>
        <div class="task-input-group">
            <input type="text" id="campo-tarea" placeholder="Escribe algo...">
            <button class="btn-blue" onclick="añadirTarea()">+</button>
        </div>
        <div id="lista-tareas" class="task-list"></div>
    </div>

    <button class="btn-trash-central hidden" id="btn-borrar" onclick="borrarMarcados()">🗑️</button>

    <script>
        const btnBorrar = document.getElementById('btn-borrar');
        const overlay = document.getElementById('pantalla-oscura');

        function mostrarVista(id) {
            document.getElementById('vista-login').classList.add('hidden');
            document.getElementById('vista-eden').classList.add('hidden');
            document.getElementById('vista-agenda').classList.add('hidden');
            btnBorrar.classList.add('hidden');

            document.getElementById(id).classList.remove('hidden');
            
            if (id === 'vista-agenda') {
                overlay.classList.add('hidden'); 
                btnBorrar.classList.remove('hidden');
            } else {
                overlay.classList.remove('hidden');
            }
        }

        function validarAcceso() {
            const u = document.getElementById('user-in').value.trim();
            const p = document.getElementById('pass-in').value.trim();
            const savedPass = localStorage.getItem('user_' + u);
            if ((u === 'admin' && p === '1234') || (savedPass && savedPass === p)) {
                mostrarVista('vista-agenda');
                cargarTareas();
            } else { alert("Datos incorrectos"); }
        }

        function cerrarSesion() { mostrarVista('vista-login'); }

        function ejecutarRegistro() {
            const u = document.getElementById('user-reg').value.trim();
            const p = document.getElementById('pass-reg').value.trim();
            if(u && p) {
                localStorage.setItem('user_' + u, p);
                alert("Usuario registrado");
                mostrarVista('vista-login');
            }
        }

        function añadirTarea() {
            const input = document.getElementById('campo-tarea');
            if(input.value.trim()) {
                let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
                tareas.unshift({text: input.value.trim(), done: false}); 
                localStorage.setItem('tareas_eden', JSON.stringify(tareas));
                input.value = '';
                cargarTareas();
            }
        }

        function cargarTareas() {
            const lista = document.getElementById('lista-tareas');
            lista.innerHTML = '';
            let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
            tareas.forEach((t, i) => {
                const item = document.createElement('div');
                item.className = 'task-item';
                item.innerHTML = `
                    <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTarea(${i})">
                    <div class="task-text" style="margin-left:10px; ${t.done ? 'text-decoration:line-through; color:gray;' : ''}">${t.text}</div>`;
                lista.appendChild(item);
            });
        }

        function toggleTarea(i) {
            let tareas = JSON.parse(localStorage.getItem('tareas_eden'));
            tareas[i].done = !tareas[i].done;
            localStorage.setItem('tareas_eden', JSON.stringify(tareas));
            cargarTareas();
        }

        function borrarMarcados() {
            let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
            tareas = tareas.filter(t => !t.done);
            localStorage.setItem('tareas_eden', JSON.stringify(tareas));
            cargarTareas();
        }

        mostrarVista('vista-login');
    </script>
</body>
</html>
