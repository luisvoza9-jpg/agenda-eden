<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIENVENIDOS AL EDÉN</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background-image: url('fondo-nubes.jpg');
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        .container {
            width: 380px; 
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1, h2 { 
            color: #00FFFF; margin-bottom: 15px; font-size: 32px; 
            text-shadow: 0 0 15px #00FFFF;
            text-align: center;
        }

        .frase-neon {
            color: #00FFFF;
            font-size: 14px;
            text-shadow: 0 0 10px #00FFFF;
            display: block;
            margin-top: 20px;
            text-align: center;
        }

        input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px;
            border: 1px solid #00FFFF; 
            background: rgba(0, 0, 0, 0.6);
            color: white; font-size: 16px; outline: none;
            text-align: center;
        }

        #vista-agenda {
            background: transparent !important;
            box-shadow: none !important;
            padding: 20px;
        }

        #vista-agenda h3 { 
            color: #00FFFF; text-shadow: 0 0 10px #00FFFF; 
            text-align: left; margin-bottom: 20px;
        }

        .task-input-group { display: flex; gap: 10px; }
        #campo-tarea { 
            text-align: left; 
            padding-left: 15px;
            flex: 1;
        }

        .btn-blue { background: #00FFFF; color: black; width: 60px; font-size: 20px; border-radius: 10px; border: none; cursor: pointer; }

        .task-list { text-align: left; margin-top: 20px; max-height: 300px; overflow-y: auto; position: relative; }
        
        /* ESTILO TAREA NORMAL */
        .task-item { 
            background: rgba(0, 0, 0, 0.5); 
            margin-bottom: 10px; padding: 15px;
            border-radius: 10px; display: flex; align-items: center;
            border: 1px solid rgba(0, 255, 255, 0.2);
            transition: all 0.2s ease-out; /* Para los checks normales */
            opacity: 1;
            transform: scale(1);
        }
        .task-text { flex: 1; margin-left: 10px; color: white; font-size: 16px; }

        /* EXIT Y PAPELERA ROJOS */
        .btn-exit-container {
            float: right; color: #ff4444; cursor: pointer; border: none; background: none;
            display: flex; flex-direction: column; align-items: center;
        }
        .exit-text { font-size: 10px; font-weight: bold; }

        /* === PAPELERA QUIETA Y CON PULSO NEÓN === */
        @keyframes pulsoNeon {
            0% { filter: drop-shadow(0 0 10px #ff4444); }
            50% { filter: drop-shadow(0 0 20px #ff0000); }
            100% { filter: drop-shadow(0 0 10px #ff4444); }
        }

        .btn-trash-central {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: none; color: #ff4444; font-size: 50px; border: none; 
            filter: drop-shadow(0 0 10px #ff4444); cursor: pointer;
            transition: all 0.3s ease; /* Para el hover */
        }
        
        /* Papelera al poner el ratón: solo brilla más, NO se mueve */
        .btn-trash-central:hover { 
            animation: pulsoNeon 1.5s infinite; 
            transform: translateX(-50%) scale(1.05); /* Un pelín más grande, pero centrada */
        }
        
        .hidden { display: none !important; }
        button:hover { opacity: 0.8; transition: 0.2s; }

        /* === ANIMACIONES DE LA BOLA DE PAPEL === */
        @keyframes arrugar {
            0% { opacity: 1; transform: scale(1); border-radius: 10px; }
            50% { opacity: 0.7; transform: scale(0.6) rotate(15deg); border-radius: 50%; background: #fff; border-color: #ccc; }
            100% { opacity: 0.3; transform: scale(0.1) rotate(0deg); border-radius: 50%; background: #fff; }
        }

        @keyframes volarALaBasura {
            0% { transform: translateY(0) scale(0.1); }
            100% { transform: translateY(50vh) scale(0); opacity: 0; }
        }

        /* Clase que se aplica a la nota que vamos a borrar */
        .arrugando {
            animation: arrugar 0.6s ease-in-out forwards;
            position: relative;
            z-index: 20;
            overflow: hidden; /* Oculta el texto al arrugarse */
        }
        
        .task-list.borrando {
            overflow: visible; /* Necesario para que la bola "vuele" fuera de la agenda */
        }

    </style>
</head>
<body>

    <div id="pantalla-oscura" class="overlay"></div>

    <div id="vista-login" class="container">
        <h1>EDÉN</h1>
        <input type="text" id="user-in" placeholder="Usuario">
        <input type="password" id="pass-in" placeholder="Contraseña">
        <button style="background:#00FFFF; color:black; width:100%; padding:12px; border-radius:10px; font-weight:bold; border:none; cursor:pointer;" onclick="validarAcceso()">ENTRAR</button>
        <span class="frase-neon">(Un paraíso para tus secretos te espera en el edén)</span>
        <p style="cursor:pointer; color:#ccc; font-size: 12px; margin-top: 20px;" onclick="mostrarVista('vista-eden')">Registrarse</p>
    </div>

    <div id="vista-eden" class="container hidden">
        <h2>REGISTRO</h2>
        <input type="text" id="user-reg" placeholder="Nuevo usuario">
        <input type="password" id="pass-reg" placeholder="Contraseña">
        <button style="background:#00FFFF; color:black; width:100%; padding:12px; border-radius:10px; font-weight:bold; border:none; cursor:pointer;" onclick="ejecutarRegistro()">GUARDAR</button>
        <p style="cursor:pointer; color:#ccc; margin-top:20px; font-size: 12px;" onclick="mostrarVista('vista-login')">Volver</p>
    </div>

    <div id="vista-agenda" class="container hidden">
        <button class="btn-exit-container" onclick="cerrarSesion()">
            <span style="font-size:30px;">🚪</span>
            <span class="exit-text">EXIT</span>
        </button>
        <h3>MIS NOTAS</h3>
        <div class="task-input-group">
            <input type="text" id="campo-tarea" placeholder="Escribe algo...">
            <button class="btn-blue" onclick="añadirTarea()">+</button>
        </div>
        <div id="lista-tareas" class="task-list"></div>
    </div>

    <button class="btn-trash-central hidden" id="btn-borrar" onclick="borrarMarcados()">🗑️</button>

    <script>
        const btnBorrar = document.getElementById('btn-borrar');
        const overlay = document.getElementById('pantalla-oscura');
        const listaTareas = document.getElementById('lista-tareas');

        function mostrarVista(id) {
            document.getElementById('vista-login').classList.add('hidden');
            document.getElementById('vista-eden').classList.add('hidden');
            document.getElementById('vista-agenda').classList.add('hidden');
            btnBorrar.classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
            
            if (id === 'vista-agenda') {
                overlay.classList.add('hidden'); 
                btnBorrar.classList.remove('hidden');
            } else { overlay.classList.remove('hidden'); }
        }

        function validarAcceso() {
            const u = document.getElementById('user-in').value.trim();
            const p = document.getElementById('pass-in').value.trim();
            const savedPass = localStorage.getItem('user_' + u);
            if ((u === 'admin' && p === '1234') || (savedPass === p)) {
                mostrarVista('vista-agenda');
                cargarTareas();
            } else { alert("Error"); }
        }

        function cerrarSesion() { mostrarVista('vista-login'); }

        function ejecutarRegistro() {
            const u = document.getElementById('user-reg').value.trim();
            const p = document.getElementById('pass-reg').value.trim();
            if(u && p) {
                localStorage.setItem('user_' + u, p);
                alert("Registrado");
                mostrarVista('vista-login');
            }
        }

        function añadirTarea() {
            const input = document.getElementById('campo-tarea');
            if(input.value.trim()) {
                let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
                tareas.unshift({text: input.value.trim(), done: false}); 
                localStorage.setItem('tareas_eden', JSON.stringify(tareas));
                input.value = '';
                cargarTareas();
            }
        }

        function cargarTareas() {
            listaTareas.innerHTML = '';
            let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
            tareas.forEach((t, i) => {
                const item = document.createElement('div');
                item.className = 'task-item';
                item.id = `nota-${i}`; // ID único para poder animar
                item.innerHTML = `
                    <input type="checkbox" style="width:20px; margin:0; cursor:pointer;" ${t.done ? 'checked' : ''} onchange="toggleTarea(${i})">
                    <div class="task-text" style="${t.done ? 'text-decoration:line-through; opacity:0.5;' : ''}">${t.text}</div>`;
                listaTareas.appendChild(item);
            });
        }

        function toggleTarea(i) {
            let tareas = JSON.parse(localStorage.getItem('tareas_eden'));
            tareas[i].done = !tareas[i].done;
            localStorage.setItem('tareas_eden', JSON.stringify(tareas));
            cargarTareas();
        }

        // === NUEVA FUNCIÓN DE BORRADO CON ANIMACIÓN "BOLA DE PAPEL" ===
        function borrarMarcados() {
            let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
            
            // 1. Identificar qué índices están marcados (t.done es true)
            const indicesABorrar = tareas.reduce((acc, t, i) => {
                if (t.done) acc.push(i);
                return acc;
            }, []);

            if (indicesABorrar.length === 0) return; // Nada que borrar

            // 2. Activar modo "vuelo" en la lista
            listaTareas.classList.add('borrando');

            // 3. Aplicar la animación de arrugado a cada nota marcada
            indicesABorrar.forEach(index => {
                const elementoNota = document.getElementById(`nota-${index}`);
                if (elementoNota) {
                    elementoNota.classList.add('arrugando');
                }
            });

            // 4. Esperar a que termine la animación de arrugado (0.6s)
            setTimeout(() => {
                // 5. Borrar los datos REALES del localStorage
                tareas = tareas.filter(t => !t.done);
                localStorage.setItem('tareas_eden', JSON.stringify(tareas));

                // 6. Recargar la lista (ahora ya sin las notas borradas)
                cargarTareas();

                // 7. Desactivar modo "vuelo"
                listaTareas.classList.remove('borrando');
                
            }, 600); // 600 milisegundos es el tiempo de la animación .arrugando
        }

        mostrarVista('vista-login');
    </script>
</body>
</html>
