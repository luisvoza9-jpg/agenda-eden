<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL EDÉN - AUDIO EDITION</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icono.png">
    <meta name="theme-color" content="#00FFFF">

    <style>
        /* ESTILO ORIGINAL BLOQUEADO - SIN CAMBIOS */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', sans-serif; background-image: url('fondo-nubes.jpg'); background-size: cover; background-position: center; overflow: hidden; color: white; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 1; }
        .container { width: 380px; text-align: center; position: relative; z-index: 10; }
        h1 { color: #00FFFF; margin-bottom: 20px; font-size: 32px; text-shadow: 0 0 15px #00FFFF; display: flex; flex-direction: column; align-items: center; letter-spacing: 2px; font-weight: bold; line-height: 1.1; min-height: 110px; }
        h1 span { display: block; width: 100%; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #00FFFF; background: rgba(0, 0, 0, 0.7); color: white; font-size: 16px; outline: none; text-align: center; }
        .btn-blue { background: #00FFFF; color: black; width: 55px; font-size: 24px; border-radius: 10px; border: none; cursor: pointer; height: 45px; }
        .task-list { text-align: left; margin-top: 20px; max-height: 250px; overflow-y: auto; }
        .task-item { background: rgba(0, 0, 0, 0.6); margin-bottom: 8px; padding: 12px; border-radius: 10px; display: flex; align-items: center; border: 1px solid rgba(0, 255, 255, 0.2); }
        .btn-trash-central { position: fixed; bottom: 30px; right: 30px; background: none; color: #ff4444; font-size: 50px; border: none; filter: drop-shadow(0 0 10px #ff4444); cursor: pointer; z-index: 100; }
        .btn-game-flotante { position: fixed; bottom: 30px; left: 30px; background: none; color: #00FFFF; font-size: 40px; border: none; cursor: pointer; z-index: 101; }
        #vista-juego { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #gameCanvas { border: 3px solid #00FFFF; background: #000; box-shadow: 0 0 30px #00FFFF; }
        .menu-eden { position: absolute; background: rgba(0,0,0,0.95); border: 2px solid #00FFFF; padding: 30px; border-radius: 20px; text-align: center; z-index: 1010; }
        .hidden { display: none !important; }
        @keyframes arrugar { to { transform: scale(0); opacity: 0; } }
        .arrugando { animation: arrugar 0.5s forwards; }
    </style>
</head>
<body>

    <div id="pantalla-oscura" class="overlay"></div>

    <button class="btn-trash-central hidden" id="btn-borrar" onclick="borrarMarcados()">🗑️</button>
    <button id="game-btn" class="btn-game-flotante hidden" onclick="abrirMenuDificultad()">🎮</button>

    <div id="vista-login" class="container">
        <h1 id="titulo-eden"></h1>
        <input type="text" id="user-in" placeholder="Usuario">
        <input type="password" id="pass-in" placeholder="Contraseña">
        <button style="background:#00FFFF; color:black; width:100%; height:45px; border-radius:10px; font-weight:bold; border:none; cursor:pointer;" onclick="validarAcceso()">ENTRAR</button>
        <p style="cursor:pointer; color:#ccc; font-size: 12px; margin-top: 20px;" onclick="mostrarVista('vista-eden')">Registrarse</p>
    </div>

    <div id="vista-eden" class="container hidden">
        <h2 style="color:#00FFFF; margin-bottom:15px;">REGISTRO</h2>
        <input type="text" id="user-reg" placeholder="Nuevo usuario">
        <input type="password" id="pass-reg" placeholder="Contraseña">
        <button style="background:#00FFFF; color:black; width:100%; height:45px; border-radius:10px; font-weight:bold; border:none; cursor:pointer;" onclick="ejecutarRegistro()">GUARDAR</button>
    </div>

    <div id="vista-agenda" class="container hidden">
        <h3 style="color:#00FFFF; text-align:left; margin-bottom:10px;">MIS NOTAS</h3>
        <div style="display:flex; gap:10px;">
            <input type="text" id="campo-tarea" placeholder="Escribe algo..." style="flex:1;">
            <button class="btn-blue" onclick="añadirTarea()">+</button>
        </div>
        <div id="lista-tareas" class="task-list"></div>
    </div>

    <div id="vista-juego" class="hidden">
        <div id="game-score" style="color:#00FFFF; font-size:24px; margin-bottom:10px;">€Eden€: 0</div>
        <canvas id="gameCanvas" width="400" height="500"></canvas>
        <div id="difficulty-menu" class="menu-eden hidden">
            <h2 style="color:#00FFFF; margin-bottom:15px;">DIFICULTAD</h2>
            <button style="width:100%; margin:5px 0; padding:10px;" onclick="iniciarJuegoEden('terrestre')">Terrestre</button>
            <button style="width:100%; margin:5px 0; padding:10px;" onclick="iniciarJuegoEden('eden')">Edén</button>
        </div>
        <div id="game-over-menu" class="menu-eden hidden">
            <h2 id="end-title">GAME OVER</h2>
            <button onclick="abrirMenuDificultad()">Reintentar</button>
            <button onclick="salirDelJuego()">Salir</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        // CONFIGURACIÓN FIREBASE (Mantén la tuya)
        const firebaseConfig = {
            apiKey: "AIzaSyCod7qKXcefhTqa40EVWbl32dygU9G10Aw",
            authDomain: "edengame-5a40c.firebaseapp.com",
            databaseURL: "https://edengame-5a40c-default-rtdb.firebaseio.com",
            projectId: "edengame-5a40c",
            storageBucket: "edengame-5a40c.firebasestorage.app",
            messagingSenderId: "837651200703",
            appId: "1:837651200703:web:0c3e237c36e1bb37b6640a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentUser = "";

        // --- SISTEMA DE AUDIO BLINDADO ---
        const sonidos = {
            hit: new Audio('hit.mp3'),
            bounce: new Audio('bounce.mp3'),
            coin: new Audio('coin.mp3'),
            fail: new Audio('fail.mp3'),
            click: new Audio('click.mp3'),
            trash: new Audio('trash.mp3')
        };

        function reproducir(nombre) {
            if (sonidos[nombre]) {
                sonidos[nombre].currentTime = 0; // Reinicia el sonido si ya estaba sonando
                sonidos[nombre].play().catch(e => console.log("Audio bloqueado por navegador"));
            }
        }

        // --- LÓGICA DE NAVEGACIÓN ---
        function mostrarVista(id) {
            reproducir('click');
            document.querySelectorAll('.container, #vista-juego').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'vista-agenda') {
                document.getElementById('btn-borrar').classList.remove('hidden');
                document.getElementById('game-btn').classList.remove('hidden');
                cargarTareas();
            }
        }

        function validarAcceso() {
            const u = document.getElementById('user-in').value.trim();
            const p = document.getElementById('pass-in').value.trim();
            db.ref('usuarios/' + u).once('value', (s) => {
                if (s.exists() && s.val().password === p) { 
                    currentUser = u; 
                    reproducir('coin'); // Sonido de éxito al entrar
                    mostrarVista('vista-agenda'); 
                } else { alert("Error"); }
            });
        }

        function ejecutarRegistro() {
            const u = document.getElementById('user-reg').value.trim();
            const p = document.getElementById('pass-reg').value.trim();
            if(u && p) { 
                db.ref('usuarios/' + u).set({ password: p }).then(() => { 
                    reproducir('coin');
                    mostrarVista('vista-login'); 
                }); 
            }
        }

        function añadirTarea() {
            reproducir('click');
            const input = document.getElementById('campo-tarea');
            if(input.value.trim()) {
                let t = JSON.parse(localStorage.getItem('tareas_' + currentUser) || '[]');
                t.unshift({text: input.value.trim(), done: false});
                localStorage.setItem('tareas_' + currentUser, JSON.stringify(t));
                input.value = ''; cargarTareas();
            }
        }

        function borrarMarcados() {
            reproducir('trash'); // Sonido de papelera
            let t = JSON.parse(localStorage.getItem('tareas_' + currentUser) || '[]');
            t = t.filter(tarea => !tarea.done);
            localStorage.setItem('tareas_' + currentUser, JSON.stringify(t));
            cargarTareas();
        }

        function cargarTareas() {
            const lista = document.getElementById('lista-tareas'); lista.innerHTML = '';
            let t = JSON.parse(localStorage.getItem('tareas_' + currentUser) || '[]');
            t.forEach((tarea, i) => {
                const item = document.createElement('div'); item.className = 'task-item';
                item.innerHTML = `<input type="checkbox" onchange="toggle(${i})" ${tarea.done?'checked':''}> <span style="margin-left:10px">${tarea.text}</span>`;
                lista.appendChild(item);
            });
        }
        function toggle(i) {
            reproducir('click');
            let t = JSON.parse(localStorage.getItem('tareas_' + currentUser)); t[i].done = !t[i].done;
            localStorage.setItem('tareas_' + currentUser, JSON.stringify(t)); cargarTareas();
        }

        // --- MOTOR DEL JUEGO CON SONIDO ---
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let ball = { x: 200, y: 400, dx: 2, dy: -2, radius: 8 };
        let paddle = { x: 150, w: 100, h: 10 };
        let bricks = [], score = 0, gameActive = false;

        function abrirMenuDificultad() {
            reproducir('click');
            document.getElementById('vista-juego').classList.remove('hidden');
            document.getElementById('difficulty-menu').classList.remove('hidden');
        }

        function iniciarJuegoEden(diff) {
            reproducir('click');
            document.getElementById('difficulty-menu').classList.add('hidden');
            score = 0; document.getElementById("game-score").innerText = "€Eden€: 0";
            ball = { x: 200, y: 400, dx: 2, dy: -2, radius: 8 };
            bricks = [];
            for(let c=0; c<5; c++) {
                bricks[c] = [];
                for(let r=0; r<4; r++) { bricks[c][r] = { x: c*75+15, y: r*30+50, status: 1 }; }
            }
            gameActive = true; requestAnimationFrame(draw);
        }

        function draw() {
            if(!gameActive) return;
            ctx.clearRect(0,0, canvas.width, canvas.height);
            
            // Dibujar ladrillos
            bricks.forEach(col => col.forEach(b => {
                if(b.status === 1) {
                    ctx.fillStyle = "#FF4444"; ctx.fillRect(b.x, b.y, 70, 20);
                    if(ball.x > b.x && ball.x < b.x+70 && ball.y > b.y && ball.y < b.y+20) {
                        ball.dy = -ball.dy; b.status = 0; score++;
                        document.getElementById("game-score").innerText = "€Eden€: " + score;
                        reproducir('hit'); // Sonido golpe ladrillo
                    }
                }
            }));

            // Dibujar pala
            ctx.fillStyle = "#00FFFF"; ctx.fillRect(paddle.x, canvas.height-30, paddle.w, paddle.h);

            // Dibujar bola
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
            ctx.fillStyle = "#FFF"; ctx.fill(); ctx.closePath();

            // Rebotes
            if(ball.x + ball.dx > canvas.width || ball.x + ball.dx < 0) ball.dx = -ball.dx;
            if(ball.y + ball.dy < 0) ball.dy = -ball.dy;
            else if(ball.y + ball.dy > canvas.height-30) {
                if(ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
                    ball.dy = -ball.dy;
                    reproducir('bounce'); // Sonido rebote pala
                } else if(ball.y > canvas.height) {
                    gameActive = false; reproducir('fail'); // Sonido derrota
                    document.getElementById('game-over-menu').classList.remove('hidden');
                }
            }

            ball.x += ball.dx; ball.y += ball.dy;
            if(gameActive) requestAnimationFrame(draw);
        }

        canvas.addEventListener("mousemove", (e) => {
            let rect = canvas.getBoundingClientRect();
            paddle.x = e.clientX - rect.left - paddle.w/2;
        });

        function salirDelJuego() { 
            reproducir('click');
            document.getElementById('vista-juego').classList.add('hidden'); 
            mostrarVista('vista-agenda'); 
        }

        // Animación de título (como la tenías)
        const tituloEden = document.getElementById('titulo-eden');
        const lineas = ["BIENVENIDOS", "AL", "EDÉN"];
        function animar() {
            tituloEden.innerHTML = ""; let l=0, c=0;
            lineas.forEach(() => { let s = document.createElement('span'); tituloEden.appendChild(s); });
            let spans = tituloEden.querySelectorAll("span");
            let t = setInterval(() => {
                if(l < lineas.length){ spans[l].innerText += lineas[l][c]; c++; if(c >= lineas[l].length){ l++; c=0; } } else clearInterval(t);
            }, 100);
        }
        animar();
    </script>
</body>
</html>
