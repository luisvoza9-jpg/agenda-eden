<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIENVENIDOS AL EDÉN (ULTRA GAME)</title>
    
    <link rel="icon" type="image/png" href="icono.png">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icono.png">
    <meta name="theme-color" content="#00FFFF">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif; background-image: url('fondo-nubes.jpg');
            background-size: cover; background-position: center; overflow: hidden; color: white;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 1; }
        .container { width: 380px; text-align: center; position: relative; z-index: 10; }
        h1 { color: #00FFFF; margin-bottom: 20px; font-size: 32px; text-shadow: 0 0 15px #00FFFF; display: flex; flex-direction: column; align-items: center; letter-spacing: 2px; font-weight: bold; line-height: 1.1; min-height: 110px; }
        h1 span { display: block; width: 100%; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #00FFFF; background: rgba(0, 0, 0, 0.7); color: white; font-size: 16px; outline: none; text-align: center; }
        
        .btn-exit-fixed { position: fixed; top: 25px; right: 25px; color: #ff4444; cursor: pointer; border: none; background: none; display: flex; flex-direction: column; align-items: center; z-index: 1000; transition: 0.3s; }
        .btn-settings-fixed { position: fixed; top: 25px; left: 25px; color: #fff; text-shadow: 0 0 10px #00FFFF; cursor: pointer; border: none; background: none; display: flex; flex-direction: column; align-items: center; z-index: 1000; transition: 0.3s; }
        
        .task-input-group { display: flex; gap: 10px; margin-top: 10px; align-items: center; }
        .btn-blue { background: #00FFFF; color: black; width: 55px; font-size: 24px; border-radius: 10px; border: none; cursor: pointer; height: 45px; flex-shrink: 0; }
        
        .task-list { text-align: left; margin-top: 20px; max-height: 250px; overflow-y: auto; }
        .task-item { background: rgba(0, 0, 0, 0.6); margin-bottom: 8px; padding: 12px; border-radius: 10px; display: flex; align-items: center; border: 1px solid rgba(0, 255, 255, 0.2); gap: 10px; }
        .task-text { flex: 1; color: white; word-break: break-word; font-size: 14px; }
        
        .settings-card { background: rgba(0,0,0,0.85); padding: 20px; border-radius: 20px; border: 1px solid #00FFFF; text-align: left; position: relative; }
        .btn-close-settings { position: absolute; top: 10px; right: 15px; color: #ff4444; font-size: 24px; cursor: pointer; font-weight: bold; }
        .setting-row { margin: 15px 0; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .social-btn { width: 100%; padding: 10px; margin-top: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .shop-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .shop-item { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; text-align: center; border: 1px solid rgba(0,255,255,0.3); cursor: pointer; }
        
        .btn-trash-central { position: fixed; bottom: 30px; right: 30px; background: none; color: #ff4444; font-size: 50px; border: none; filter: drop-shadow(0 0 10px #ff4444); cursor: pointer; z-index: 100; }
        .btn-game-flotante { position: fixed; bottom: 30px; left: 30px; background: none; color: #00FFFF; font-size: 40px; border: none; cursor: pointer; z-index: 101; }
        .btn-rank-flotante { position: fixed; bottom: 30px; left: 90px; background: none; color: #FFD700; font-size: 40px; border: none; cursor: pointer; z-index: 101; }
        .btn-shop-flotante { position: fixed; bottom: 30px; left: 150px; background: none; color: #FFD700; font-size: 40px; border: none; cursor: pointer; z-index: 101; display: flex; flex-direction: column; align-items: center; }
        
        #vista-juego { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('fondo-nubes.jpg'); background-size: cover; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #gameCanvas { border: 3px solid #00FFFF; background: rgba(0, 0, 0, 0.9); box-shadow: 0 0 30px #00FFFF; }
        .hidden { display: none !important; }
        .game-btn-neon { background: none; border: 1px solid #00FFFF; color: #00FFFF; padding: 10px 20px; margin: 10px auto; border-radius: 10px; cursor: pointer; width: 100%; }
        
        /* Estilo Avatar */
        #avatar-preview { width: 90px; height: 90px; border-radius: 50%; border: 2px solid #00FFFF; box-shadow: 0 0 15px #00FFFF; overflow: hidden; background: #000; display: flex; justify-content: center; align-items: center; margin-bottom: 10px; }
        .avatar-opt { background:none; border:1px solid rgba(0,255,255,0.3); border-radius:5px; cursor:pointer; font-size:20px; padding:5px; transition: 0.3s; }
        .avatar-opt:hover { border-color: #00FFFF; transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="pantalla-oscura" class="overlay"></div>

    <button id="settings-btn" class="btn-settings-fixed hidden" onclick="mostrarVista('vista-ajustes')">
        <span style="font-size:32px">⚙️</span>
    </button>

    <button id="exit-btn" class="btn-exit-fixed hidden" onclick="cerrarSesion()">
        <span style="font-size:32px">🚪</span>
    </button>
    
    <button class="btn-trash-central hidden" id="btn-borrar" onclick="borrarMarcados()">🗑️</button>
    <button id="game-btn" class="btn-game-flotante hidden" onclick="abrirMenuDificultad()">🎮</button>
    <button id="rank-btn" class="btn-rank-flotante hidden" onclick="abrirRanking()">🏆</button>
    <button id="shop-btn" class="btn-shop-flotante hidden" onclick="mostrarVista('vista-tienda')"><span>🏠</span></button>

    <div id="vista-login" class="container">
        <h1 id="titulo-eden"></h1>
        <input type="text" id="user-in" placeholder="Usuario">
        <input type="password" id="pass-in" placeholder="Contraseña">
        <button class="game-btn-neon" style="background:#00FFFF; color:black;" onclick="validarAcceso()">ENTRAR</button>
        
        <div style="margin-top:20px;">
            <button class="social-btn" style="background:white; color:black;" onclick="entrarConGoogle()">
                <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Google
            </button>
        </div>
        <p style="cursor:pointer; color:#ccc; font-size: 12px; margin-top: 20px;" onclick="mostrarVista('vista-eden')">Registrarse</p>
    </div>

    <div id="vista-eden" class="container hidden">
        <h2 style="color:#00FFFF; margin-bottom:15px;">REGISTRO</h2>
        <input type="text" id="user-reg" placeholder="Nuevo usuario">
        <input type="password" id="pass-reg" placeholder="Contraseña">
        <input type="number" id="age-reg" placeholder="Edad">
        <button class="game-btn-neon" onclick="ejecutarRegistro()">GUARDAR</button>
        <p style="cursor:pointer; color:#ccc; margin-top:20px;" onclick="mostrarVista('vista-login')">Volver</p>
    </div>

    <div id="vista-agenda" class="container hidden">
        <h3 style="color:#00FFFF; text-align:left; margin-bottom:10px;">MIS NOTAS</h3>
        <div class="task-input-group">
            <input type="text" id="campo-tarea" placeholder="Escribe algo..." style="text-align:left; padding-left:15px;">
            <button class="btn-blue" onclick="añadirTarea()">+</button>
        </div>
        <div id="lista-tareas" class="task-list"></div>
    </div>

    <div id="vista-ajustes" class="container hidden">
        <div class="settings-card" style="max-height: 85vh; overflow-y: auto;">
            <div class="btn-close-settings" onclick="mostrarVista('vista-agenda')">✖</div>
            <h2 style="color:#00FFFF; margin-bottom:15px; text-align:center;">PERFIL EDÉN</h2>
            
            <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 15px;">
                <div id="avatar-preview"><span id="avatar-img" style="font-size: 45px;">👤</span></div>
                <div style="display: flex; gap: 8px;">
                    <button class="avatar-opt" onclick="cambiarAvatar('🥷')">🥷</button>
                    <button class="avatar-opt" onclick="cambiarAvatar('🤖')">🤖</button>
                    <button class="avatar-opt" onclick="cambiarAvatar('👽')">👽</button>
                    <button class="avatar-opt" onclick="cambiarAvatar('👻')">👻</button>
                    <label for="upload-photo" style="background:white; border-radius:5px; cursor:pointer; padding:5px 8px; color:black; font-size:16px;">📷</label>
                    <input type="file" id="upload-photo" accept="image/*" style="display:none" onchange="subirFotoLocal(this)">
                </div>
            </div>

            <div style="background: rgba(0,255,255,0.1); padding: 12px; border-radius: 10px; border: 1px solid rgba(0,255,255,0.3); margin-bottom: 15px;">
                <p id="perfil-nombre" style="color: #00FFFF; font-weight: bold;">Usuario: -</p>
                <p id="perfil-edad" style="font-size: 13px;">Edad: -</p>
                <p id="perfil-puntos" style="font-size: 13px; color: #FFD700;">Récord Edén: 0 pts</p>
            </div>

            <input type="password" id="edit-pass" placeholder="Nueva contraseña">
            <input type="number" id="edit-age" placeholder="Cambiar edad">
            <button class="game-btn-neon" onclick="actualizarPerfil()">GUARDAR CAMBIOS</button>
            
            <div class="setting-row" style="margin-top:15px;">
                <span>Volumen</span>
                <input type="range" id="vol-range" min="0" max="1" step="0.1" value="0.5" onchange="ajustarVolumen(this.value)">
            </div>
        </div>
    </div>

    <div id="vista-tienda" class="container hidden">
        <div class="settings-card">
            <div class="btn-close-settings" onclick="mostrarVista('vista-agenda')">✖</div>
            <h2 style="color:#FFD700; text-align:center;">EDÉN SHOP</h2>
            <span id="shop-balance" style="display:block; text-align:center; color:#FFD700; margin:10px 0;">Saldo: 0 €Eden€</span>
            <div class="shop-grid">
                <div class="shop-item" onclick="comprar('paleta','red')"><span style="color:red">▬</span><span style="font-size:10px;">500 pts</span></div>
                <div class="shop-item" onclick="comprar('paleta','yellow')"><span style="color:yellow">▬</span><span style="font-size:10px;">1000 pts</span></div>
                <div class="shop-item" onclick="comprar('vida',1)">❤️ x1<span style="font-size:10px;">5000 pts</span></div>
            </div>
        </div>
    </div>

    <div id="vista-juego" class="hidden">
        <button class="btn-game-return" style="position:fixed; top:20px; left:20px; background:none; border:none; color:#00FFFF; font-size:30px;" onclick="salirDelJuego()">🚪</button>
        <div id="game-score" style="margin-bottom:10px; color:#FFD700;">€Eden€: 0</div>
        <canvas id="gameCanvas" width="450" height="450"></canvas>
        <div id="difficulty-menu" class="container" style="background:rgba(0,0,0,0.9); padding:20px; border-radius:15px; border:1px solid #00FFFF;">
            <button class="game-btn-neon" onclick="iniciarJuegoEden('terrestre')">Terrestre</button>
            <button class="game-btn-neon" onclick="iniciarJuegoEden('eden')">Edén</button>
        </div>
        <div id="game-over-menu" class="hidden" style="text-align:center; margin-top:20px;">
            <button class="game-btn-neon" onclick="abrirMenuDificultad()">Reintentar</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCod7qKXcefhTqa40EVWbl32dygU9G10Aw",
            authDomain: "edengame-5a40c.firebaseapp.com",
            databaseURL: "https://edengame-5a40c-default-rtdb.firebaseio.com",
            projectId: "edengame-5a40c",
            storageBucket: "edengame-5a40c.firebasestorage.app",
            messagingSenderId: "837651200703",
            appId: "1:837651200703:web:0c3e237c36e1bb37b6640a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        let currentUser = "";
        let masterVolume = 0.5;
        let userBalance = 0;

        function reproducir(n) { /* Lógica de sonido idéntica a la anterior */ }

        function cambiarAvatar(emoji) {
            document.getElementById('avatar-img').innerHTML = emoji;
            db.ref('usuarios/' + currentUser).update({ avatar: emoji });
        }

        function subirFotoLocal(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = `<img src="${e.target.result}" style="width:100%; height:100%; object-fit:cover;">`;
                    document.getElementById('avatar-img').innerHTML = img;
                    db.ref('usuarios/' + currentUser).update({ avatar: e.target.result });
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function mostrarVista(id) {
            document.querySelectorAll('.container, #vista-juego').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            
            const commonBtns = ['exit-btn', 'settings-btn', 'game-btn', 'rank-btn', 'shop-btn'];
            const isMenu = ['vista-agenda', 'vista-ajustes', 'vista-tienda'].includes(id);
            
            commonBtns.forEach(btn => document.getElementById(btn).classList.toggle('hidden', !isMenu));
            if(id === 'vista-agenda') {
                document.getElementById('btn-borrar').classList.remove('hidden');
                cargarTareas();
            } else {
                document.getElementById('btn-borrar').classList.add('hidden');
            }

            if(id === 'vista-ajustes') {
                db.ref('usuarios/' + currentUser).once('value', (s) => {
                    const d = s.val();
                    document.getElementById('perfil-nombre').innerText = "Usuario: " + currentUser;
                    document.getElementById('perfil-edad').innerText = "Edad: " + (d.age || "??");
                    if(d.avatar) {
                        const isImg = d.avatar.includes('data:image');
                        document.getElementById('avatar-img').innerHTML = isImg ? `<img src="${d.avatar}" style="width:100%; height:100%; object-fit:cover;">` : d.avatar;
                    }
                    db.ref('ranking/eden/' + currentUser).once('value', (r) => {
                        document.getElementById('perfil-puntos').innerText = "Récord Edén: " + (r.val() || 0) + " pts";
                    });
                });
            }
        }

        function validarAcceso() {
            const u = document.getElementById('user-in').value.trim();
            const p = document.getElementById('pass-in').value.trim();
            db.ref('usuarios/' + u).once('value', (s) => {
                if (s.exists() && s.val().password === p) {
                    currentUser = u;
                    userBalance = s.val().saldo || 0;
                    mostrarVista('vista-agenda');
                } else { alert("Error"); }
            });
        }

        function entrarConGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then((result) => {
                const userKey = result.user.email.replace(/[.@]/g, '_');
                db.ref('usuarios/' + userKey).once('value', (s) => {
                    if (!s.exists()) db.ref('usuarios/' + userKey).set({ password: "google_user", saldo: 0 });
                    currentUser = userKey;
                    mostrarVista('vista-agenda');
                });
            });
        }

        function ejecutarRegistro() {
            const u = document.getElementById('user-reg').value.trim();
            const p = document.getElementById('pass-reg').value.trim();
            const a = document.getElementById('age-reg').value;
            if(u && p) db.ref('usuarios/' + u).set({ password: p, age: a, saldo: 0 }).then(() => mostrarVista('vista-login'));
        }

        function actualizarPerfil() {
            const p = document.getElementById('edit-pass').value;
            const a = document.getElementById('edit-age').value;
            let up = {}; if(p) up.password = p; if(a) up.age = a;
            db.ref('usuarios/' + currentUser).update(up).then(() => alert("Actualizado"));
        }

        function añadirTarea() {
            const inp = document.getElementById('campo-tarea');
            if(inp.value.trim()) {
                let t = JSON.parse(localStorage.getItem('tareas_'+currentUser) || '[]');
                t.unshift({text: inp.value.trim(), done: false});
                localStorage.setItem('tareas_'+currentUser, JSON.stringify(t));
                inp.value = ''; cargarTareas();
            }
        }

        function cargarTareas() {
            const lista = document.getElementById('lista-tareas'); lista.innerHTML = '';
            let t = JSON.parse(localStorage.getItem('tareas_'+currentUser) || '[]');
            t.forEach((tarea, i) => {
                const item = document.createElement('div'); item.className = 'task-item';
                item.id = `nota-${i}`;
                item.innerHTML = `
                    <input type="checkbox" ${tarea.done?'checked':''} onchange="toggle(${i})">
                    <div class="task-text" style="${tarea.done?'text-decoration:line-through;opacity:0.5':''}">${tarea.text}</div>
                    <button onclick="modificarTareaInline(${i})">✏️</button>
                `;
                lista.appendChild(item);
            });
        }

        function toggle(i) {
            let t = JSON.parse(localStorage.getItem('tareas_'+currentUser)); t[i].done = !t[i].done;
            localStorage.setItem('tareas_'+currentUser, JSON.stringify(t)); cargarTareas();
        }

        function modificarTareaInline(i) {
            const nuevo = prompt("Editar nota:", JSON.parse(localStorage.getItem('tareas_'+currentUser))[i].text);
            if(nuevo) {
                let t = JSON.parse(localStorage.getItem('tareas_'+currentUser)); t[i].text = nuevo;
                localStorage.setItem('tareas_'+currentUser, JSON.stringify(t)); cargarTareas();
            }
        }

        function borrarMarcados() {
            let t = JSON.parse(localStorage.getItem('tareas_'+currentUser) || '[]');
            t = t.filter(x => !x.done);
            localStorage.setItem('tareas_'+currentUser, JSON.stringify(t)); cargarTareas();
        }

        function ajustarVolumen(v) { masterVolume = v; }
        function cerrarSesion() { currentUser = ""; mostrarVista('vista-login'); }

        // Juego base (Simplificado para el ejemplo, mantén tu lógica de draw completa)
        function abrirMenuDificultad() { mostrarVista('vista-juego'); document.getElementById('difficulty-menu').classList.remove('hidden'); }
        function salirDelJuego() { mostrarVista('vista-agenda'); }
        function iniciarJuegoEden(d) { document.getElementById('difficulty-menu').classList.add('hidden'); /* lógica inicio */ }

        mostrarVista('vista-login');
    </script>
</body>
</html>
