<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIENVENIDOS AL EDÉN (ULTRA GAME)</title>
    
    <link rel="icon" type="image/png" href="icono.png">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icono.png">
    <meta name="theme-color" content="#00FFFF">

    <style>
        /* MANTENGO TU ESTILO ORIGINAL */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif; background-image: url('fondo-nubes.jpg');
            background-size: cover; background-position: center; overflow: hidden; color: white;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 1; }
        .container { width: 380px; text-align: center; position: relative; z-index: 10; }
        h1 { color: #00FFFF; margin-bottom: 20px; font-size: 32px; text-shadow: 0 0 15px #00FFFF; display: flex; flex-direction: column; align-items: center; letter-spacing: 2px; font-weight: bold; line-height: 1.1; min-height: 110px; }
        h1 span { display: block; width: 100%; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #00FFFF; background: rgba(0, 0, 0, 0.7); color: white; font-size: 16px; outline: none; text-align: center; }
        
        .btn-exit-fixed { position: fixed; top: 25px; right: 25px; color: #ff4444; cursor: pointer; border: none; background: none; display: flex; flex-direction: column; align-items: center; z-index: 1000; transition: 0.3s; }
        .btn-settings-fixed { position: fixed; top: 25px; left: 25px; color: #fff; text-shadow: 0 0 10px #00FFFF; cursor: pointer; border: none; background: none; display: flex; flex-direction: column; align-items: center; z-index: 1000; transition: 0.3s; }

        .task-input-group { display: flex; gap: 10px; margin-top: 10px; align-items: center; }
        .btn-blue { background: #00FFFF; color: black; width: 55px; font-size: 24px; border-radius: 10px; border: none; cursor: pointer; height: 45px; flex-shrink: 0; }
        
        .task-list { text-align: left; margin-top: 20px; max-height: 250px; overflow-y: auto; }
        .task-item { background: rgba(0, 0, 0, 0.6); margin-bottom: 8px; padding: 12px; border-radius: 10px; display: flex; align-items: center; border: 1px solid rgba(0, 255, 255, 0.2); gap: 10px; transition: 0.3s; }
        .task-text { flex: 1; color: white; word-break: break-word; font-size: 14px; }

        .btn-trash-central { position: fixed; bottom: 30px; right: 30px; background: none; color: #ff4444; font-size: 50px; border: none; filter: drop-shadow(0 0 10px #ff4444); cursor: pointer; z-index: 100; }
        .hidden { display: none !important; }
        
        .settings-card { background: rgba(0,0,0,0.85); padding: 20px; border-radius: 20px; border: 1px solid #00FFFF; text-align: left; position: relative; }
        .btn-close-settings { position: absolute; top: 10px; right: 15px; color: #ff4444; font-size: 24px; cursor: pointer; font-weight: bold; }
        
        /* BOTONES FLOTANTES */
        .btn-game-flotante { position: fixed; bottom: 30px; left: 20px; background: none; color: #00FFFF; font-size: 40px; border: none; cursor: pointer; z-index: 101; }
        .btn-rank-flotante { position: fixed; bottom: 30px; left: 75px; background: none; color: #FFD700; font-size: 40px; border: none; cursor: pointer; z-index: 101; }
        .btn-mansion-flotante { position: fixed; bottom: 30px; left: 135px; background: none; color: #00FF00; font-size: 40px; border: none; cursor: pointer; z-index: 101; display:flex; flex-direction:column; align-items:center; }
        .btn-shop-flotante { position: fixed; bottom: 30px; left: 195px; background: none; color: #FFD700; font-size: 40px; border: none; cursor: pointer; z-index: 101; display: flex; flex-direction: column; align-items: center; }
        .btn-chat-flotante { position: fixed; bottom: 30px; left: 255px; background: none; color: #00FF00; font-size: 40px; border: none; cursor: pointer; z-index: 101; display: flex; flex-direction: column; align-items: center; }
        .btn-shop-label { font-size: 9px; font-weight: bold; margin-top: -5px; }

        #vista-mansion { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 2000; }
        #mansionCanvas { border: 4px solid #00FF00; background: #111; box-shadow: 0 0 20px #00FF00; }
        .controles-mansion { position: fixed; bottom: 20px; right: 20px; display: grid; grid-template-columns: repeat(3, 50px); gap: 5px; }
        .btn-joy { width: 50px; height: 50px; background: rgba(0,255,0,0.3); border: 1px solid #00FF00; color: white; border-radius: 5px; }

        #game-score { position: fixed; top: 20px; right: 100px; font-size: 20px; color: #FFD700; z-index: 3000; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body>

    <div id="pantalla-oscura" class="overlay"></div>

    <button id="settings-btn" class="btn-settings-fixed hidden" onclick="mostrarVista('vista-ajustes')">⚙️</button>
    <button id="exit-btn" class="btn-exit-fixed hidden" onclick="cerrarSesion()">🚪<span style="font-size:10px">EXIT</span></button>
    <button class="btn-trash-central hidden" id="btn-borrar" onclick="borrarMarcados()">🗑️</button>
    
    <button id="game-btn" class="btn-game-flotante hidden" onclick="abrirMenuDificultad()">🎮</button>
    <button id="rank-btn" class="btn-rank-flotante hidden" onclick="abrirRanking()">🏆</button>
    <button id="mansion-btn" class="btn-mansion-flotante hidden" onclick="entrarMansion()">🏡<span class="btn-shop-label">MI EDÉN</span></button>
    <button id="shop-btn" class="btn-shop-flotante hidden" onclick="mostrarVista('vista-tienda')">🏠<span class="btn-shop-label">TIENDA</span></button>
    <button id="chat-btn" class="btn-chat-flotante hidden" onclick="mostrarVista('vista-chat')">💬<span class="btn-shop-label">CHAT</span></button>

    <div id="game-score" class="hidden">€Eden€: 0</div>

    <div id="vista-login" class="container">
        <h1 id="titulo-eden"></h1>
        <input type="text" id="user-in" placeholder="Usuario">
        <input type="password" id="pass-in" placeholder="Contraseña">
        <button style="background:#00FFFF; color:black; width:100%; height:45px; border-radius:10px; font-weight:bold; border:none; cursor:pointer;" onclick="validarAcceso()">ENTRAR</button>
        <p style="cursor:pointer; color:#ccc; font-size: 12px; margin-top: 20px;" onclick="mostrarVista('vista-eden')">Registrarse</p>
    </div>

    <div id="vista-eden" class="container hidden">
        <h2 style="color:#00FFFF; margin-bottom:15px;">REGISTRO</h2>
        <input type="text" id="user-reg" placeholder="Nuevo usuario">
        <input type="password" id="pass-reg" placeholder="Contraseña">
        <button onclick="ejecutarRegistro()">GUARDAR</button>
    </div>

    <div id="vista-agenda" class="container hidden">
        <h3 style="color:#00FFFF; text-align:left; margin-bottom:10px;">MIS NOTAS</h3>
        <div class="task-input-group">
            <input type="text" id="campo-tarea" placeholder="Escribe algo...">
            <button class="btn-blue" onclick="añadirTarea()">+</button>
        </div>
        <div id="lista-tareas" class="task-list"></div>
    </div>

    <div id="vista-tienda" class="container hidden">
        <div class="settings-card">
            <div class="btn-close-settings" onclick="mostrarVista('vista-agenda')">✖</div>
            <h2 style="color:#FFD700; text-align:center;">EDÉN SHOP</h2>
            <p id="shop-balance" style="text-align:center">Saldo: 0</p>
            <div class="shop-grid">
                <div class="shop-item" onclick="comprar('paleta','red')">Pala Roja<span class="shop-price">500</span></div>
                <div class="shop-item" onclick="comprar('vida',1)">Vida ❤️<span class="shop-price">5000</span></div>
            </div>
            <hr>
            <p style="font-size:10px; color:gray; margin-top:10px;">PROPIEDADES</p>
            <div class="shop-item" style="width:100%" onclick="comprarPropiedad('mansion')">
                🏡 MANSIÓN DEL EDÉN <span class="shop-price">20,000 €Eden€</span>
            </div>
        </div>
    </div>

    <div id="vista-chat" class="container hidden">
        <div class="settings-card">
            <div class="btn-close-settings" onclick="mostrarVista('vista-agenda')">✖</div>
            <div id="chat-box" style="height:200px; overflow-y:auto; border:1px solid #00FF00; margin-bottom:10px; padding:5px;"></div>
            <input type="text" id="chat-input" placeholder="Mensaje...">
            <button onclick="enviarMensaje()">Enviar</button>
        </div>
    </div>

    <div id="vista-mansion" class="hidden">
        <button class="btn-game-return" onclick="mostrarVista('vista-agenda')">🚪 Salir</button>
        <canvas id="mansionCanvas" width="400" height="400"></canvas>
        <div class="controles-mansion">
            <div></div><button class="btn-joy" onclick="moverMansion('up')">▲</button><div></div>
            <button class="btn-joy" onclick="moverMansion('left')">◀</button>
            <button class="btn-joy" onclick="moverMansion('down')">▼</button>
            <button class="btn-joy" onclick="moverMansion('right')">▶</button>
        </div>
        <div id="mansion-msg" style="position:fixed; top:80px; color:#00FF00; font-weight:bold;"></div>
    </div>

    <div id="vista-juego" class="hidden">
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        <div id="difficulty-menu" class="menu-eden hidden">
            <button class="game-btn-neon" onclick="iniciarJuegoEden('terrestre')">Fácil</button>
            <button class="game-btn-neon" onclick="iniciarJuegoEden('eden')">Nivel Edén</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        // FIREBASE Y VARIABLES (TUYAS AL 100%)
        const firebaseConfig = {
            apiKey: "AIzaSyCod7qKXcefhTqa40EVWbl32dygU9G10Aw",
            authDomain: "edengame-5a40c.firebaseapp.com",
            databaseURL: "https://edengame-5a40c-default-rtdb.firebaseio.com",
            projectId: "edengame-5a40c",
            storageBucket: "edengame-5a40c.firebasestorage.app",
            messagingSenderId: "837651200703",
            appId: "1:837651200703:web:0c3e237c36e1bb37b6640a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentUser = "";
        let userBalance = 0;
        let tieneMansion = false;

        // MOTOR DE LA MANSIÓN 2D (LO NUEVO)
        const mCanvas = document.getElementById("mansionCanvas");
        const mCtx = mCanvas.getContext("2d");
        let player = { x: 200, y: 200, size: 20, color: "#00FFFF" };

        function entrarMansion() {
            db.ref('usuarios/' + currentUser + '/propiedades/mansion').once('value', s => {
                if (s.val() === true || currentUser === 'admin') {
                    mostrarVista('vista-mansion');
                    dibujarMansion();
                } else {
                    alert("Esta propiedad cuesta 20,000 €Eden€. Cómprala en la tienda.");
                }
            });
        }

        function dibujarMansion() {
            mCtx.clearRect(0, 0, mCanvas.width, mCanvas.height);
            // Suelo y Paredes
            mCtx.strokeStyle = "#00FF00";
            mCtx.strokeRect(50, 50, 300, 300);
            // Zona de Objetos (Muebles futuro)
            mCtx.fillStyle = "rgba(0, 255, 0, 0.1)";
            mCtx.fillRect(60, 60, 100, 50); 
            mCtx.fillStyle = "white"; mCtx.fillText("ZONA GARAJE", 70, 90);

            // Personaje
            mCtx.fillStyle = player.color;
            mCtx.fillRect(player.x, player.y, player.size, player.size);
            mCtx.shadowBlur = 10; mCtx.shadowColor = "#00FFFF";
        }

        function moverMansion(dir) {
            const step = 15;
            if(dir === 'up' && player.y > 60) player.y -= step;
            if(dir === 'down' && player.y < 320) player.y += step;
            if(dir === 'left' && player.x > 60) player.x -= step;
            if(dir === 'right' && player.x < 320) player.x += step;
            dibujarMansion();
            reproducir('click');
        }

        function comprarPropiedad(pro) {
            if(userBalance >= 20000) {
                db.ref('usuarios/' + currentUser + '/saldo').set(userBalance - 20000);
                db.ref('usuarios/' + currentUser + '/propiedades/' + pro).set(true);
                alert("¡Felicidades! Ya tienes tu Mansión en el Edén.");
            } else {
                alert("Saldo insuficiente.");
            }
        }

        // INTEGRACIÓN CON TUS FUNCIONES ORIGINALES
        function mostrarVista(id) {
            document.querySelectorAll('.container, #vista-juego, #vista-mansion').forEach(c => c.classList.add('hidden'));
            document.getElementById('game-score').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
            
            // Botones flotantes visibles solo en la agenda
            const botonesGlobales = ['exit-btn', 'settings-btn', 'game-btn', 'rank-btn', 'shop-btn', 'chat-btn', 'mansion-btn'];
            if(id === 'vista-agenda') {
                botonesGlobales.forEach(b => document.getElementById(b).classList.remove('hidden'));
                document.getElementById('btn-borrar').classList.remove('hidden');
                document.getElementById('game-score').classList.remove('hidden');
            } else {
                botonesGlobales.forEach(b => document.getElementById(b).classList.add('hidden'));
                document.getElementById('btn-borrar').classList.add('hidden');
            }
        }

        // --- TUS FUNCIONES DE SIEMPRE (PÉGALAS AQUÍ O MANTENLAS) ---
        function validarAcceso() {
            const u = document.getElementById('user-in').value.trim();
            const p = document.getElementById('pass-in').value.trim();
            db.ref('usuarios/' + u).once('value', (s) => {
                if (s.exists() && s.val().password === p) {
                    currentUser = u;
                    db.ref('usuarios/' + u + '/saldo').on('value', snap => {
                        userBalance = snap.val() || 0;
                        document.getElementById('game-score').innerText = "€Eden€: " + userBalance;
                    });
                    mostrarVista('vista-agenda');
                } else { alert("Error"); }
            });
        }

        // Sonidos, Tareas, Chat, Juego de Ladrillos... (Mismo código que me pasaste)
        const sonidos = { click: new Audio('click.mp3'), coin: new Audio('coin.mp3') };
        function reproducir(n) { if(sonidos[n]) sonidos[n].play().catch(()=>{}); }

        function añadirTarea() {
            const input = document.getElementById('campo-tarea');
            if(input.value.trim()) {
                let t = JSON.parse(localStorage.getItem('tareas_'+currentUser) || '[]');
                t.unshift({text: input.value.trim(), done: false});
                localStorage.setItem('tareas_'+currentUser, JSON.stringify(t));
                input.value = ''; cargarTareas();
            }
        }

        function cargarTareas() {
            const lista = document.getElementById('lista-tareas'); lista.innerHTML = '';
            let t = JSON.parse(localStorage.getItem('tareas_'+currentUser) || '[]');
            t.forEach((tarea, i) => {
                const item = document.createElement('div'); item.className = 'task-item';
                item.innerHTML = `<span class="task-text">${tarea.text}</span>`;
                lista.appendChild(item);
            });
        }

        // Inicializar animación login
        const tituloEden = document.getElementById('titulo-eden');
        const lineas = ["BIENVENIDOS", "AL", "EDÉN"];
        function animar() {
            tituloEden.innerHTML = "BIENVENIDOS AL EDÉN";
        }
        animar();
        // ---------------------------------------------------------
    </script>
</body>
</html>
