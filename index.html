<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA EDEN</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            background-image: url('fondo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 1s ease;
            position: relative;
        }

        /* CAPA AZUL SUAVE PARA EL INTERIOR */
        body.interior::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 20, 50, 0.4); 
            z-index: -1;
        }

        /* CONTENEDOR PRINCIPAL */
        .container {
            width: 350px; 
            text-align: center;
            background: rgba(45, 45, 45, 0.9); 
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1;
        }

        h1 { color: #00FFFF; margin-bottom: 20px; font-size: 22px; }
        
        input {
            width: 85%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            outline: none;
        }

        button {
            padding: 10px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-blue { background: #2196F3; color: white; width: 100%; }
        .btn-cyan { background: #00FFFF; color: black; width: 100%; }
        .btn-red { background: #ff4444; color: white; padding: 6px 12px; font-size: 11px; }

        .hidden { display: none; }

        .task-list { 
            text-align: left; 
            max-height: 380px; 
            overflow-y: auto; 
            margin-top: 15px;
        }

        /* --- CORRECCIÓN DE ALINEACIÓN A LA IZQUIERDA --- */
        .task-item { 
            display: flex; 
            align-items: center; /* Centra verticalmente check y texto */
            justify-content: flex-start; /* PEGA TODO A LA IZQUIERDA */
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 8px;
            padding: 12px;
            border-radius: 10px;
            border-left: 4px solid #00FFFF;
            animation: slideIn 0.3s ease-out forwards;
        }

        .task-text {
            font-size: 16px; 
            line-height: 1.4; /* Espacio para que no se amontone el texto */
            text-align: left; 
            margin-left: 12px; /* Espacio después del checkbox */
            flex-grow: 1; /* Ocupa el resto del ancho */
            word-break: break-word; 
            color: #fff;
        }

        input[type="checkbox"] {
            transform: scale(1.2);
            cursor: pointer;
            flex-shrink: 0; /* Evita que el checkbox se deforme */
        }
        /* ----------------------------------------------- */

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .task-list::-webkit-scrollbar { width: 4px; }
        .task-list::-webkit-scrollbar-thumb { background: #00FFFF; border-radius: 10px; }
    </style>
</head>
<body id="cuerpo">

    <div id="vista-login" class="container">
        <h1>SISTEMA EDEN</h1>
        <input type="text" id="user-in" placeholder="Usuario">
        <input type="password" id="pass-in" placeholder="Contraseña">
        <button class="btn-cyan" onclick="validarAcceso()">ENTRAR</button>
        <p style="cursor:pointer; color:#2196F3; margin-top:15px; font-size: 12px;" onclick="mostrarVista('vista-eden')">REGISTRARSE</p>
    </div>

    <div id="vista-eden" class="container hidden">
        <h2 style="color:#00FFFF; font-size: 20px;">REGISTRO</h2>
        <input type="text" id="user-reg" placeholder="Nuevo usuario">
        <input type="password" id="pass-reg" placeholder="Contraseña">
        <button class="btn-blue" onclick="ejecutarRegistro()">GUARDAR</button>
        <p style="cursor:pointer; color:#ccc; margin-top:15px; font-size: 12px;" onclick="mostrarVista('vista-login')">Volver</p>
    </div>

    <div id="vista-agenda" class="container hidden">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="color:#00FFFF; margin:0; font-size: 18px;">MIS NOTAS</h3>
            <button class="btn-red" onclick="cerrarSesion()">SALIR</button>
        </div>
        
        <div style="display:flex; gap:8px;">
            <input type="text" id="campo-tarea" placeholder="Nueva nota..." style="margin:0; font-size: 14px; flex-grow:1;">
            <button class="btn-blue" style="width:45px; margin:0;" onclick="añadirTarea()">+</button>
        </div>

        <div id="lista-tareas" class="task-list"></div>
        <button style="background:transparent; color:#888; border:1px solid #444; width: 100%; margin-top: 20px; font-size: 10px; cursor:pointer; padding: 5px; border-radius: 5px;" onclick="borrarMarcados()">LIMPIAR COMPLETADAS</button>
    </div>

    <script>
        function mostrarVista(id) {
            document.getElementById('vista-login').classList.add('hidden');
            document.getElementById('vista-eden').classList.add('hidden');
            document.getElementById('vista-agenda').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function validarAcceso() {
            const u = document.getElementById('user-in').value.trim();
            const p = document.getElementById('pass-in').value.trim();
            const savedPass = localStorage.getItem('user_' + u);
            if ((u === 'admin' && p === '1234') || savedPass === p) {
                document.getElementById('cuerpo').style.backgroundImage = "url('fondo1.jpg')"; 
                document.getElementById('cuerpo').classList.add('interior'); 
                mostrarVista('vista-agenda');
                cargarTareas();
            } else { alert("Datos incorrectos"); }
        }

        function cerrarSesion() {
            document.getElementById('cuerpo').style.backgroundImage = "url('fondo.jpg')";
            document.getElementById('cuerpo').classList.remove('interior'); 
            mostrarVista('vista-login');
        }

        function ejecutarRegistro() {
            const u = document.getElementById('user-reg').value.trim();
            const p = document.getElementById('pass-reg').value.trim();
            if(u && p) {
                localStorage.setItem('user_' + u, p);
                alert("Usuario guardado");
                mostrarVista('vista-login');
            }
        }

        function añadirTarea() {
            const input = document.getElementById('campo-tarea');
            if(input.value.trim()) {
                let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
                tareas.unshift({text: input.value.trim(), done: false}); 
                localStorage.setItem('tareas_eden', JSON.stringify(tareas));
                input.value = '';
                cargarTareas();
            }
        }

        function cargarTareas() {
            const lista = document.getElementById('lista-tareas');
            lista.innerHTML = '';
            let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
            tareas.forEach((t, i) => {
                lista.innerHTML += `
                    <div class="task-item">
                        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTarea(${i})">
                        <div class="task-text" style="${t.done ? 'text-decoration: line-through; color: #888;' : ''}">${t.text}</div>
                    </div>`;
            });
        }

        function toggleTarea(i) {
            let tareas = JSON.parse(localStorage.getItem('tareas_eden'));
            tareas[i].done = !tareas[i].done;
            localStorage.setItem('tareas_eden', JSON.stringify(tareas));
            cargarTareas();
        }

        function borrarMarcados() {
            let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
            tareas = tareas.filter(t => !t.done);
            localStorage.setItem('tareas_eden', JSON.stringify(tareas));
            cargarTareas();
        }
    </script>
</body>
</html>
