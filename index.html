<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA EDEN</title>
    <style>
        /* CONFIGURACIÓN INICIAL DEL CUERPO */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            /* Fondo inicial: Atardecer */
            background-image: url('fondo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 1s ease-in-out; /* Cambio suave de fondo */
        }

        /* CONTENEDOR DE LOGIN Y REGISTRO */
        .container {
            width: 380px;
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* DISEÑO DE LA AGENDA (MÁS ANCHA DE IZQUIERDA A DERECHA) */
        #vista-agenda {
            width: 90%;
            max-width: 900px; /* Se expande para que las notas sean largas */
            background: rgba(10, 10, 20, 0.92);
        }

        h1 { color: #2196F3; margin-bottom: 25px; }
        .eden-title { color: #00FFFF; font-size: 35px; font-weight: bold; margin-bottom: 20px; }

        input {
            width: 90%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid #444;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 18px;
            outline: none;
        }

        button {
            padding: 15px;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            transition: 0.3s;
        }

        .btn-blue { background: #2196F3; color: white; width: 100%; }
        .btn-cyan { background: #00FFFF; color: black; width: 100%; }
        .btn-red { background: #ff4444; color: white; padding: 8px 20px; font-size: 14px; }

        .hidden { display: none; }

        /* LISTA DE NOTAS GRANDES */
        .task-list { 
            text-align: left; 
            max-height: 500px; 
            overflow-y: auto; 
            margin-top: 30px; 
            width: 100%;
        }

        .task-item { 
            display: flex; 
            align-items: center; 
            background: rgba(255, 255, 255, 0.08);
            margin-bottom: 15px;
            padding: 20px;
            border-radius: 15px;
            border-left: 5px solid #2196F3;
            animation: slideIn 0.3s ease-out;
        }

        .task-text {
            font-size: 22px; /* NOTAS MÁS GRANDES */
            margin-left: 20px;
            flex-grow: 1;
            word-break: break-word;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        input[type="checkbox"] {
            transform: scale(2); /* Checkbox gigante */
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="vista-login" class="container">
        <h1>SISTEMA EDEN</h1>
        <input type="text" id="user-in" placeholder="Usuario">
        <input type="password" id="pass-in" placeholder="Contraseña">
        <button class="btn-blue" onclick="validarAcceso()">ENTRAR</button>
        <p style="cursor:pointer; color:#2196F3; margin-top:20px;" onclick="mostrarVista('vista-eden')">¿No tienes cuenta? REGÍSTRATE</p>
    </div>

    <div id="vista-eden" class="container hidden">
        <div class="eden-title">UNIRSE AL EDEN</div>
        <input type="text" id="user-reg" placeholder="Nuevo Usuario">
        <input type="password" id="pass-reg" placeholder="Nueva Contraseña">
        <button class="btn-cyan" onclick="ejecutarRegistro()">CREAR CUENTA</button>
        <p style="cursor:pointer; color:#00FFFF; margin-top:15px;" onclick="mostrarVista('vista-login')">Volver al Login</p>
    </div>

    <div id="vista-agenda" class="container hidden">
        <div style="display:flex; justify-content: space-between; align-items: center; width: 100%;">
            <h2 style="color:#2196F3; margin:0;">MIS NOTAS</h2>
            <button class="btn-red" onclick="cerrarSesion()">CERRAR SESIÓN</button>
        </div>
        
        <div style="display:flex; gap:10px; margin-top:25px; width: 100%;">
            <input type="text" id="campo-tarea" placeholder="Escribe una nota gigante..." style="margin:0; flex-grow:1;">
            <button class="btn-blue" style="width:100px; margin:0;" onclick="añadirTarea()">AÑADIR</button>
        </div>

        <button style="background:#444; color:white; width: 100%; margin-top: 15px; font-size: 14px;" onclick="borrarMarcados()">LIMPIAR COMPLETADAS</button>
        
        <div id="lista-tareas" class="task-list"></div>
    </div>

    <script>
        function mostrarVista(id) {
            document.getElementById('vista-login').classList.add('hidden');
            document.getElementById('vista-eden').classList.add('hidden');
            document.getElementById('vista-agenda').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function validarAcceso() {
            const u = document.getElementById('user-in').value.trim();
            const p = document.getElementById('pass-in').value.trim();
            const savedPass = localStorage.getItem('user_' + u);

            if ((u === 'admin' && p === '1234') || savedPass === p) {
                // CAMBIO A FOTO GALÁCTICA
                document.body.style.backgroundImage = "url('fondo1.jpg')"; 
                mostrarVista('vista-agenda');
                cargarTareas();
            } else { alert("Usuario o clave incorrecta"); }
        }

        function cerrarSesion() {
            // VOLVER AL ATARDECER
            document.body.style.backgroundImage = "url('fondo.jpg')";
            mostrarVista('vista-login');
        }

        function ejecutarRegistro() {
            const u = document.getElementById('user-reg').value.trim();
            const p = document.getElementById('pass-reg').value.trim();
            if(u && p) {
                localStorage.setItem('user_' + u, p);
                alert("¡Bienvenido al Eden! Ya puedes entrar.");
                mostrarVista('vista-login');
            }
        }

        function añadirTarea() {
            const input = document.getElementById('campo-tarea');
            if(input.value.trim()) {
                let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
                tareas.push({text: input.value.trim(), done: false});
                localStorage.setItem('tareas_eden', JSON.stringify(tareas));
                input.value = '';
                cargarTareas();
            }
        }

        function cargarTareas() {
            const lista = document.getElementById('lista-tareas');
            lista.innerHTML = '';
            let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
            tareas.forEach((t, i) => {
                lista.innerHTML += `
                    <div class="task-item">
                        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTarea(${i})">
                        <div class="task-text" style="${t.done ? 'text-decoration: line-through; color: #777;' : ''}">${t.text}</div>
                    </div>`;
            });
        }

        function toggleTarea(i) {
            let tareas = JSON.parse(localStorage.getItem('tareas_eden'));
            tareas[i].done = !tareas[i].done;
            localStorage.setItem('tareas_eden', JSON.stringify(tareas));
            cargarTareas();
        }

        function borrarMarcados() {
            let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
            tareas = tareas.filter(t => !t.done);
            localStorage.setItem('tareas_eden', JSON.stringify(tareas));
            cargarTareas();
        }
    </script>
</body>
</html>
