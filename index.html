<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIENVENIDOS AL EDÉN (GAME ED.)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background-image: url('fondo-nubes.jpg'); /* Mismo fondo */
            background-size: cover;
            background-position: center;
            overflow: hidden;
            color: white;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        .container {
            width: 380px; 
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* === TÍTULO MODO PELÍCULA === */
        h1 { 
            color: #00FFFF; margin-bottom: 20px; font-size: 32px; 
            text-shadow: 0 0 15px #00FFFF;
            display: flex; flex-direction: column; align-items: center;
            letter-spacing: 2px; font-weight: bold;
            line-height: 1.1; min-height: 110px; 
        }
        h1 span { display: block; width: 100%; }

        .frase-neon {
            color: #00FFFF; font-size: 14px; text-shadow: 0 0 10px #00FFFF;
            display: block; margin-top: 20px; text-align: center;
        }

        input {
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px;
            border: 1px solid #00FFFF; background: rgba(0, 0, 0, 0.7);
            color: white; font-size: 16px; outline: none; text-align: center;
        }

        /* === PUERTA EXIT GLOBAL (AGENDA) === */
        .btn-exit-fixed {
            position: fixed; top: 25px; right: 25px; 
            color: #ff4444; cursor: pointer; border: none; background: none;
            display: flex; flex-direction: column; align-items: center;
            z-index: 1000; transition: 0.3s;
        }
        .btn-exit-fixed:hover { transform: scale(1.2); filter: drop-shadow(0 0 10px #ff0000); }
        .door-icon { font-size: 32px; }
        .exit-text { font-size: 10px; font-weight: bold; }

        /* === NOTAS A LA IZQUIERDA (SENTIDO ESCRITURA) === */
        .task-input-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-blue { background: #00FFFF; color: black; width: 55px; font-size: 24px; border-radius: 10px; border: none; cursor: pointer; height: 45px; }

        .task-list { text-align: left; margin-top: 20px; max-height: 250px; overflow-y: auto; }
        .task-item { 
            background: rgba(0, 0, 0, 0.6); margin-bottom: 8px; padding: 12px;
            border-radius: 10px; display: flex; align-items: center;
            border: 1px solid rgba(0, 255, 255, 0.2);
            text-align: left; 
        }
        .task-text { flex: 1; margin-left: 10px; color: white; word-break: break-word; text-align: left; }

        /* === PAPELERA (CON EFECTO CANASTA) === */
        .btn-trash-central {
            position: fixed; bottom: 30px; right: 30px;
            background: none; color: #ff4444; font-size: 50px; border: none; 
            filter: drop-shadow(0 0 10px #ff4444); cursor: pointer; z-index: 100;
            transform-origin: bottom right;
        }

        .hidden { display: none !important; }

        @keyframes borrarVuelo {
            to { transform: scale(0) translate(20vw, 50vh); opacity: 0; }
        }
        @keyframes inclinarPapelera {
            0% { transform: rotate(0deg) scale(1); }
            60% { transform: rotate(-15deg) scale(1.1); filter: drop-shadow(0 0 20px #ff4444); } 
            100% { transform: rotate(0deg) scale(1); }
        }
        .arrugando { animation: borrarVuelo 0.6s ease-in forwards; pointer-events: none; }
        .papelera-atrapando { animation: inclinarPapelera 0.6s ease-out forwards; }

        /* =========================================
           === ESTILOS DEL MINIJUEGO ARKANOID ======
           ========================================= */
        
        /* === MANDO DE CONSOLA (BOTÓN SECRETO) === */
        .btn-game-flotante {
            position: fixed; bottom: 30px; left: 30px; /* LADO IZQUIERDO */
            background: none; color: #00FFFF; font-size: 40px; border: none; 
            filter: drop-shadow(0 0 10px #00FFFF); cursor: pointer;
            z-index: 101; transition: 0.3s;
        }
        .btn-game-flotante:hover { transform: scale(1.2) rotate(-15deg); filter: drop-shadow(0 0 15px #00FFFF); }

        /* === PANTALLA DEL JUEGO (FULLSCREEN OVERLAY) === */
        #vista-juego {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.6); /* Mismo fondo pero más oscuro para que brillen los neones */
            background-image: url('fondo-nubes.jpg'); /* Mismo fondo */
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            z-index: 1000; padding: 20px;
        }

        /* === CANVAS DEL JUEGO === */
        #gameCanvas {
            border: 2px solid #00FFFF;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 20px #00FFFF;
            margin-top: 50px;
            cursor: none; /* Escondemos el ratón al jugar */
        }

        /* === PUERTA RETORNAR (IZQUIERDA) === */
        .btn-game-return {
            position: absolute; top: 20px; left: 20px; /* ESQUINA SUPERIOR IZQUIERDA */
            color: #00FFFF; cursor: pointer; border: none; background: none;
            display: flex; flex-direction: column; align-items: center;
            z-index: 1002; transition: 0.3s;
        }
        .btn-game-return:hover { transform: scale(1.1); filter: drop-shadow(0 0 10px #00FFFF); }
        .btn-game-return .door-icon { font-size: 26px; }
        .btn-game-return .exit-text { font-size: 9px; font-weight: bold; margin-top: -2px; color: #00FFFF; }

        /* Marcador de puntuación neón */
        #game-score {
            font-size: 20px; color: #00FFFF; text-shadow: 0 0 10px #00FFFF;
            position: absolute; top: 20px; right: 20px;
        }
    </style>
</head>
<body>

    <div id="pantalla-oscura" class="overlay"></div>

    <button id="exit-btn" class="btn-exit-fixed hidden" onclick="cerrarSesion()">
        <span class="door-icon">🚪</span>
        <span class="exit-text">EXIT</span>
    </button>
    <button class="btn-trash-central hidden" id="btn-borrar" onclick="borrarMarcados()">🗑️</button>

    <button id="game-btn" class="btn-game-flotante hidden" onclick="iniciarJuegoEden()" title="¡Secreto: Entrar al Edén Arkanoid!">🎮</button>

    <div id="vista-login" class="container">
        <h1 id="titulo-eden"></h1>
        <input type="text" id="user-in" placeholder="Usuario">
        <input type="password" id="pass-in" placeholder="Contraseña">
        <button style="background:#00FFFF; color:black; width:100%; height:45px; border-radius:10px; font-weight:bold; border:none; cursor:pointer;" onclick="validarAcceso()">ENTRAR</button>
        <span class="frase-neon">¡Un paraíso para tus secretos te espera en el edén!</span>
        <p style="cursor:pointer; color:#ccc; font-size: 12px; margin-top: 20px;" onclick="mostrarVista('vista-eden')">Registrarse</p>
    </div>

    <div id="vista-eden" class="container hidden">
        <h2 style="color:#00FFFF; margin-bottom:15px;">REGISTRO</h2>
        <input type="text" id="user-reg" placeholder="Nuevo usuario">
        <input type="password" id="pass-reg" placeholder="Contraseña">
        <button style="background:#00FFFF; color:black; width:100%; height:45px; border-radius:10px; font-weight:bold; border:none; cursor:pointer;" onclick="ejecutarRegistro()">GUARDAR</button>
        <p style="cursor:pointer; color:#ccc; margin-top:20px;" onclick="mostrarVista('vista-login')">Volver</p>
    </div>

    <div id="vista-agenda" class="container hidden">
        <h3 style="color:#00FFFF; text-align:left; margin-bottom:10px;">MIS NOTAS</h3>
        <div class="task-input-group">
            <input type="text" id="campo-tarea" placeholder="Escribe algo..." style="text-align:left; padding-left:15px;">
            <button class="btn-blue" onclick="añadirTarea()">+</button>
        </div>
        <div id="lista-tareas" class="task-list"></div>
    </div>

    <div id="vista-juego" class="hidden">
        <button class="btn-game-return" onclick="salirDelJuego()" title="Cerrar el Juego y volver a las Notas">
            <span class="door-icon">🚪</span>
            <span class="exit-text">RETORNAR</span>
        </button>
        
        <h2 style="color:#00FFFF; font-size: 32px; text-shadow: 0 0 15px #00FFFF; margin-bottom: 20px;">ARKANOID EDÉN</h2>
        <div id="game-score">SCORE: 0</div>
        
        <canvas id="gameCanvas" width="550" height="400"></canvas>
    </div>

    <script>
        const tituloEden = document.getElementById('titulo-eden');
        const lineas = ["BIENVENIDOS", "AL", "EDÉN"];
        let timer;

        function animar() {
            tituloEden.innerHTML = "";
            let l=0, c=0;
            clearInterval(timer);
            lineas.forEach(() => {
                let s = document.createElement('span');
                tituloEden.appendChild(s);
            });
            let spans = tituloEden.querySelectorAll("span");

            timer = setInterval(() => {
                if(l < lineas.length){
                    spans[l].innerText += lineas[l][c];
                    c++;
                    if(c >= lineas[l].length){ l++; c=0; }
                } else clearInterval(timer);
            }, 100);
        }

        function mostrarVista(id) {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById('btn-borrar').classList.add('hidden');
            document.getElementById('exit-btn').classList.add('hidden');
            document.getElementById('game-btn').classList.add('hidden'); // Ocultar mando
            document.getElementById('vista-juego').classList.add('hidden'); // Ocultar juego

            const overlay = document.getElementById('pantalla-oscura');

            document.getElementById(id).classList.remove('hidden');
            
            if(id === 'vista-login') animar();
            if(id === 'vista-agenda') {
                document.getElementById('btn-borrar').classList.remove('hidden');
                document.getElementById('exit-btn').classList.remove('hidden');
                document.getElementById('game-btn').classList.remove('hidden'); // MOSTRAR MANDO EN AGENDA
                overlay.classList.add('hidden');
                cargarTareas();
            } else { overlay.classList.remove('hidden'); }
        }

        function validarAcceso() {
            const u = document.getElementById('user-in').value.trim();
            const p = document.getElementById('pass-in').value.trim();
            const saved = localStorage.getItem('user_' + u);
            if ((u === 'admin' && p === '1234') || (saved !== null && saved === p)) { mostrarVista('vista-agenda'); }
            else { alert("Usuario o contraseña incorrectos"); }
        }

        function ejecutarRegistro() {
            const u = document.getElementById('user-reg').value.trim();
            const p = document.getElementById('pass-reg').value.trim();
            if(u && p) {
                localStorage.setItem('user_' + u, p);
                alert("¡Registrado!");
                mostrarVista('vista-login');
            }
        }

        function cerrarSesion() { mostrarVista('vista-login'); }

        function añadirTarea() {
            const input = document.getElementById('campo-tarea');
            if(input.value.trim()) {
                let t = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
                t.unshift({text: input.value.trim(), done: false});
                localStorage.setItem('tareas_eden', JSON.stringify(t));
                input.value = '';
                cargarTareas();
            }
        }

        function cargarTareas() {
            const lista = document.getElementById('lista-tareas');
            lista.innerHTML = '';
            let t = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
            t.forEach((tarea, i) => {
                const item = document.createElement('div');
                item.className = 'task-item';
                item.id = `nota-${i}`;
                item.innerHTML = `<input type="checkbox" style="width:20px; cursor:pointer;" ${tarea.done?'checked':''} onchange="toggle(${i})"><div class="task-text" style="${tarea.done?'text-decoration:line-through;opacity:0.5':''}">${tarea.text}</div>`;
                lista.appendChild(item);
            });
        }

        function toggle(i) {
            let t = JSON.parse(localStorage.getItem('tareas_eden'));
            t[i].done = !t[i].done;
            localStorage.setItem('tareas_eden', JSON.stringify(t));
            cargarTareas();
        }

        function borrarMarcados() {
            let t = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
            let hayMarcados = false;
            const papelera = document.getElementById('btn-borrar');
            t.forEach((tarea, i) => { if(tarea.done) { document.getElementById(`nota-${i}`).classList.add('arrugando'); hayMarcados = true; } });
            if(!hayMarcados) return;
            papelera.classList.add('papelera-atrapando');
            setTimeout(() => { papelera.classList.remove('papelera-atrapando'); }, 550);
            setTimeout(() => {
                t = t.filter(tarea => !tarea.done);
                localStorage.setItem('tareas_eden', JSON.stringify(t));
                cargarTareas();
            }, 600);
        }

        mostrarVista('vista-login');

        /* =========================================
           === LÓGICA DEL MINIJUEGO ARKANOID ========
           ========================================= */
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("game-score");
        
        let ballRadius = 6;
        let x, y, dx, dy;
        let paddleHeight = 10;
        let paddleWidth = 75;
        let paddleX;
        let rightPressed = false;
        let leftPressed = false;
        let brickRowCount, brickColumnCount, brickWidth, brickHeight, brickPadding, brickOffsetTop, brickOffsetLeft;
        let bricks = [];
        let score = 0;
        let gameActive = false;
        let gameInterval;

        function resetVariablesJuego() {
            canvas.style.cursor = "none";
            x = canvas.width / 2;
            y = canvas.height - 30;
            dx = 3; dy = -3;
            paddleX = (canvas.width - paddleWidth) / 2;
            brickRowCount = 3;
            brickColumnCount = 6;
            brickWidth = 75;
            brickHeight = 20;
            brickPadding = 10;
            brickOffsetTop = 30;
            brickOffsetLeft = 30;
            bricks = [];
            for (let c = 0; c < brickColumnCount; c++) {
                bricks[c] = [];
                for (let r = 0; r < brickRowCount; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: 1 };
                }
            }
            score = 0;
            updateScore();
        }

        function updateScore() { scoreElement.innerText = "SCORE: " + score; }

        document.addEventListener("mousemove", mouseMoveHandler, false);

        function mouseMoveHandler(e) {
            if (!gameActive) return;
            let relativeX = e.clientX - canvas.offsetLeft - (window.innerWidth - canvas.width)/2;
            if (relativeX > 0 && relativeX < canvas.width) {
                paddleX = relativeX - paddleWidth / 2;
            }
        }

        function collisionDetection() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    let b = bricks[c][r];
                    if (b.status === 1) {
                        if (x > b.x && x < b.x + brickWidth && y > b.y && y < b.y + brickHeight) {
                            dy = -dy;
                            b.status = 0;
                            score++;
                            updateScore();
                            if (score === brickRowCount * brickColumnCount) {
                                alert("¡ARKANOID EDÉN COMPLETADO! ¡Felicidades, Socio!");
                                salirDelJuego();
                            }
                        }
                    }
                }
            }
        }

        function drawBall() {
            ctx.beginPath(); ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = "#FF0000"; ctx.fill(); ctx.closePath();
            ctx.shadowColor = '#FF0000'; ctx.shadowBlur = 10;
        }

        function drawPaddle() {
            ctx.beginPath(); ctx.rect(paddleX, canvas.height - paddleHeight, paddleWidth, paddleHeight);
            ctx.fillStyle = "#00FFFF"; ctx.fill(); ctx.closePath();
            ctx.shadowColor = '#00FFFF'; ctx.shadowBlur = 10;
        }

        function drawBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) {
                        let brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                        let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                        bricks[c][r].x = brickX; bricks[c][r].y = brickY;
                        ctx.beginPath(); ctx.rect(brickX, brickY, brickWidth, brickHeight);
                        ctx.fillStyle = "#FF4444"; ctx.fill(); ctx.closePath();
                        ctx.shadowColor = '#FF4444'; ctx.shadowBlur = 8;
                    }
                }
            }
        }

        function draw() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.shadowBlur = 0;
            drawBricks(); drawBall(); drawPaddle(); collisionDetection();
            if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) { dx = -dx; }
            if (y + dy < ballRadius) { dy = -dy; } else if (y + dy > canvas.width - (ballRadius+paddleHeight*2)) { // Game Over a esta altura
                 if (x > paddleX && x < paddleX + paddleWidth) { dy = -dy; } 
                 else if (y + dy > canvas.height + ballRadius * 2) { 
                    alert("GAME OVER, SOCIO... Inténtalo de nuevo.");
                    salirDelJuego();
                 }
            }
            x += dx; y += dy;
        }

        function iniciarJuegoEden() {
            if (!localStorage.getItem('tareas_eden')) { alert("Secreto: Necesitas tener al menos una nota guardada para abrir el portal del juego."); return; }
            mostrarVista('vista-juego');
            resetVariablesJuego();
            gameActive = true;
            gameInterval = setInterval(draw, 10);
        }

        function salirDelJuego() {
            gameActive = false;
            clearInterval(gameInterval);
            canvas.style.cursor = "auto";
            alert("Saliendo del Arkanoid... ¡Volviendo al Edén!");
            mostrarVista('vista-agenda');
        }

    </script>
</body>
</html>
