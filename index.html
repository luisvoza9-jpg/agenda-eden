<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Edén | Luisvoza9</title>
    <style>
        /* TU DISEÑO INTACTO */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif; background-image: url('fondo-nubes.jpg');
            background-size: cover; background-position: center; overflow: hidden; color: white;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 1; }
        .container { width: 380px; text-align: center; position: relative; z-index: 10; }
        h1 { color: #00FFFF; margin-bottom: 20px; font-size: 32px; text-shadow: 0 0 15px #00FFFF; display: flex; flex-direction: column; align-items: center; letter-spacing: 2px; font-weight: bold; line-height: 1.1; min-height: 110px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #00FFFF; background: rgba(0, 0, 0, 0.7); color: white; font-size: 16px; outline: none; text-align: center; }
        .btn-blue { background: #00FFFF; color: black; width: 55px; font-size: 24px; border-radius: 10px; border: none; cursor: pointer; height: 45px; flex-shrink: 0; }
        .task-list { text-align: left; margin-top: 20px; max-height: 250px; overflow-y: auto; }
        .task-item { background: rgba(0, 0, 0, 0.6); margin-bottom: 8px; padding: 12px; border-radius: 10px; display: flex; align-items: center; border: 1px solid rgba(0, 255, 255, 0.2); gap: 10px; }
        .task-text { flex: 1; color: white; word-break: break-word; font-size: 14px; }
        .btn-trash-central { position: fixed; bottom: 30px; right: 30px; background: none; color: #ff4444; font-size: 50px; border: none; cursor: pointer; z-index: 100; }
        .hidden { display: none !important; }
        .btn-game-flotante { position: fixed; bottom: 30px; left: 30px; background: none; color: #00FFFF; font-size: 40px; border: none; cursor: pointer; z-index: 101; }
        /* AJUSTE DE PANTALLA MÓVIL */
        #gameCanvas { border: 3px solid #00FFFF; background: rgba(0, 0, 0, 0.9); box-shadow: 0 0 30px #00FFFF; max-width: 95vw; height: auto; touch-action: none; }
        #vista-juego { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('fondo-nubes.jpg'); background-size: cover; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .menu-eden { position: absolute; background: rgba(0,0,0,0.95); border: 2px solid #00FFFF; padding: 30px; border-radius: 20px; text-align: center; z-index: 1010; width: 340px; }
        .game-btn-neon { background: none; border: 1px solid #00FFFF; color: #00FFFF; padding: 10px 20px; margin: 10px auto; border-radius: 10px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <div id="pantalla-oscura" class="overlay"></div>

    <button id="exit-btn" class="hidden" style="position:fixed; top:25px; right:25px; background:none; border:none; color:#ff4444; font-size:32px; z-index:1000;" onclick="cerrarSesion()">🚪</button>
    <button class="btn-trash-central hidden" id="btn-borrar" onclick="borrarMarcados()">🗑️</button>
    <button id="game-btn" class="btn-game-flotante hidden" onclick="abrirMenuDificultad()">🎮</button>

    <div id="vista-login" class="container">
        <h1 id="titulo-eden"></h1>
        <input type="text" id="user-in" placeholder="Usuario">
        <input type="password" id="pass-in" placeholder="Contraseña">
        <button style="background:#00FFFF; color:black; width:100%; height:45px; border-radius:10px; font-weight:bold; border:none; cursor:pointer;" onclick="validarAcceso()">ENTRAR</button>
    </div>

    <div id="vista-agenda" class="container hidden">
        <h3 style="color:#00FFFF; text-align:left; margin-bottom:10px;">MIS NOTAS</h3>
        <div style="display:flex; gap:10px;">
            <input type="text" id="campo-tarea" placeholder="Escribe algo...">
            <button class="btn-blue" onclick="añadirTarea()">+</button>
        </div>
        <div id="lista-tareas" class="task-list"></div>
    </div>

    <div id="vista-juego" class="hidden">
        <div id="game-score" style="color:#FFD700; margin-bottom:10px;">€Eden€: 0</div>
        <canvas id="gameCanvas" width="480" height="500"></canvas>
        <div id="difficulty-menu" class="menu-eden">
            <h2 style="color:#00FFFF; margin-bottom:15px;">DIFICULTAD</h2>
            <button class="game-btn-neon" onclick="iniciarJuegoEden('terrestre')">Fácil</button>
            <button class="game-btn-neon" onclick="iniciarJuegoEden('eden')">Difícil</button>
            <button class="game-btn-neon" onclick="mostrarVista('vista-agenda')">Volver</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        // CONFIGURACIÓN FIREBASE (TUYA ORIGINAL)
        const firebaseConfig = {
            apiKey: "AIzaSyCod7qKXcefhTqa40EVWbl32dygU9G10Aw",
            databaseURL: "https://edengame-5a40c-default-rtdb.firebaseio.com",
            projectId: "edengame-5a40c",
            appId: "1:837651200703:web:0c3e237c36e1bb37b6640a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentUser = "";
        let masterVolume = 0.5;

        // SONIDO SIN RETRASO (Pre-cargado)
        const sonidos = {
            hit: new Audio('hit.mp3'), bounce: new Audio('bounce.mp3'),
            trash: new Audio('trash.mp3'), click: new Audio('click.mp3')
        };
        
        function reproducir(n) { 
            const s = sonidos[n];
            if(s) { 
                s.currentTime = 0; 
                s.volume = masterVolume;
                s.play().catch(()=>{}); 
            }
        }

        // TÍTULO ANIMADO
        const tituloEden = document.getElementById('titulo-eden');
        function animar() {
            const txt = "BIENVENIDOS AL EDÉN";
            tituloEden.innerText = "";
            let i = 0;
            let itv = setInterval(() => {
                tituloEden.innerText += txt[i]; i++;
                if(i >= txt.length) clearInterval(itv);
            }, 100);
        }

        function validarAcceso() {
            const u = document.getElementById('user-in').value;
            const p = document.getElementById('pass-in').value;
            if(u === 'admin' && p === '1234') { 
                currentUser = u; 
                reproducir('click');
                mostrarVista('vista-agenda'); 
            }
        }

        function mostrarVista(id) {
            document.querySelectorAll('.container, #vista-juego').forEach(v => v.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'vista-agenda') {
                document.getElementById('exit-btn').classList.remove('hidden');
                document.getElementById('game-btn').classList.remove('hidden');
                document.getElementById('btn-borrar').classList.remove('hidden');
                cargarTareas();
            }
        }

        // NOTAS CON FIREBASE
        function añadirTarea() {
            const val = document.getElementById('campo-tarea').value;
            if(val) {
                db.ref('notas/' + currentUser).push({ text: val, done: false });
                document.getElementById('campo-tarea').value = "";
                reproducir('click');
            }
        }

        function cargarTareas() {
            db.ref('notas/' + currentUser).on('value', s => {
                const lista = document.getElementById('lista-tareas');
                lista.innerHTML = "";
                s.forEach(child => {
                    const item = document.createElement('div');
                    item.className = 'task-item';
                    item.innerHTML = `<input type="checkbox" ${child.val().done?'checked':''} onclick="db.ref('notas/${currentUser}/${child.key}').update({done:!${child.val().done}})">
                                      <div class="task-text">${child.val().text}</div>`;
                    lista.appendChild(item);
                });
            });
        }

        function borrarMarcados() {
            reproducir('trash');
            db.ref('notas/' + currentUser).once('value', s => {
                s.forEach(child => { if(child.val().done) child.ref.remove(); });
            });
        }

        // MOTOR DE JUEGO FLUIDO (SIN LAG)
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let ball, paddleX, bricks = [], score = 0, gameActive = false, gameLoopId;

        function abrirMenuDificultad() { 
            mostrarVista('vista-juego'); 
            document.getElementById('difficulty-menu').classList.remove('hidden'); 
        }

        function iniciarJuegoEden(diff) {
            document.getElementById('difficulty-menu').classList.add('hidden');
            reproducir('click');
            score = 0;
            paddleX = (canvas.width - 90) / 2;
            ball = { x: canvas.width/2, y: canvas.height-50, dx: 3, dy: -3, r: 8 };
            
            bricks = [];
            let rows = (diff === 'eden') ? 8 : 4;
            for(let c=0; c<7; c++) {
                bricks[c] = [];
                for(let r=0; r<rows; r++) bricks[c][r] = { x:0, y:0, status: 1 };
            }
            gameActive = true;
            runLoop();
        }

        function runLoop() {
            if(!gameActive) return;
            ctx.clearRect(0,0, canvas.width, canvas.height);
            draw();
            gameLoopId = requestAnimationFrame(runLoop);
        }

        function draw() {
            // Ladrillos
            bricks.forEach((col, c) => {
                col.forEach((b, r) => {
                    if(b.status === 1) {
                        b.x = c * 65 + 15; b.y = r * 25 + 50;
                        ctx.fillStyle = "#FF4444";
                        ctx.fillRect(b.x, b.y, 60, 20);
                        if(ball.x > b.x && ball.x < b.x+60 && ball.y > b.y && ball.y < b.y+20) {
                            ball.dy = -ball.dy; b.status = 0; score++;
                            reproducir('hit');
                            document.getElementById('game-score').innerText = "€Eden€: " + score;
                        }
                    }
                });
            });

            // Pelota
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
            ctx.fillStyle = "#00FFFF"; ctx.fill(); ctx.closePath();

            if(ball.x + ball.dx > canvas.width - ball.r || ball.x + ball.dx < ball.r) ball.dx = -ball.dx;
            if(ball.y + ball.dy < ball.r) ball.dy = -ball.dy;
            else if(ball.y + ball.dy > canvas.height - 30) {
                if(ball.x > paddleX && ball.x < paddleX + 90) {
                    ball.dy = -ball.dy;
                    reproducir('bounce');
                } else if(ball.y > canvas.height) {
                    gameActive = false;
                    cancelAnimationFrame(gameLoopId);
                    alert("FIN DEL JUEGO");
                    mostrarVista('vista-agenda');
                }
            }
            ball.x += ball.dx; ball.y += ball.dy;

            // Pala
            ctx.fillStyle = "#00FFFF";
            ctx.fillRect(paddleX, canvas.height - 20, 90, 10);
        }

        // CONTROLES TÁCTILES SIN LAG
        canvas.addEventListener("touchmove", (e) => {
            e.preventDefault();
            let rect = canvas.getBoundingClientRect();
            let root = document.documentElement;
            let touch = e.touches[0];
            let mouseX = touch.clientX - rect.left - root.scrollLeft;
            paddleX = mouseX - 45;
        }, {passive: false});

        animar();
    </script>
</body>
</html>
