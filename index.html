<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA EDEN</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            background-image: url('fondo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 1s ease-in-out;
        }

        /* CUADRADO DEL LOGIN Y AGENDA (Tamaño elegante) */
        .container {
            width: 380px; 
            text-align: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 { color: #2196F3; margin-bottom: 25px; letter-spacing: 2px; }
        
        input {
            width: 85%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid #444;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 18px;
            outline: none;
        }

        button {
            padding: 15px;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-blue { background: #2196F3; color: white; width: 100%; }
        .btn-cyan { background: #00FFFF; color: black; width: 100%; }
        .btn-red { background: #ff4444; color: white; padding: 6px 15px; font-size: 12px; border-radius: 8px; }

        .hidden { display: none; }

        /* LISTA DE TAREAS */
        .task-list { 
            text-align: left; 
            max-height: 400px; 
            overflow-y: auto; 
            margin-top: 20px;
            padding-right: 5px;
        }

        .task-item { 
            display: flex; 
            align-items: center; 
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 12px;
            padding: 18px;
            border-radius: 15px;
            border-left: 4px solid #00FFFF;
            /* ANIMACIÓN: DE IZQUIERDA A DERECHA */
            animation: entrarIzquierda 0.5s ease-out forwards;
        }

        .task-text {
            font-size: 24px; /* LETRAS GRANDES */
            font-weight: 500;
            margin-left: 15px;
            flex-grow: 1;
            word-break: break-word;
        }

        @keyframes entrarIzquierda {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        input[type="checkbox"] {
            transform: scale(2); /* Checkbox grande para que sea fácil de marcar */
            cursor: pointer;
        }

        /* Scrollbar personalizada para que no sea fea */
        .task-list::-webkit-scrollbar { width: 5px; }
        .task-list::-webkit-scrollbar-thumb { background: #2196F3; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="vista-login" class="container">
        <h1 style="color: #00FFFF;">SISTEMA EDEN</h1>
        <input type="text" id="user-in" placeholder="Usuario">
        <input type="password" id="pass-in" placeholder="Contraseña">
        <button class="btn-cyan" onclick="validarAcceso()">ENTRAR</button>
        <p style="cursor:pointer; color:#2196F3; margin-top:20px; font-size: 14px;" onclick="mostrarVista('vista-eden')">¿No tienes cuenta? REGÍSTRATE</p>
    </div>

    <div id="vista-eden" class="container hidden">
        <h2 style="color:#00FFFF;">NUEVA CUENTA</h2>
        <input type="text" id="user-reg" placeholder="Tu nombre">
        <input type="password" id="pass-reg" placeholder="Tu clave">
        <button class="btn-blue" onclick="ejecutarRegistro()">REGISTRARSE</button>
        <p style="cursor:pointer; color:#00FFFF; margin-top:15px; font-size: 14px;" onclick="mostrarVista('vista-login')">Volver al inicio</p>
    </div>

    <div id="vista-agenda" class="container hidden">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="color:#00FFFF; margin:0;">NOTAS</h3>
            <button class="btn-red" onclick="cerrarSesion()">SALIR</button>
        </div>
        
        <div style="display:flex; gap:8px;">
            <input type="text" id="campo-tarea" placeholder="¿Qué piensas?" style="margin:0; font-size: 16px;">
            <button class="btn-blue" style="width:60px; margin:0; padding: 5px;" onclick="añadirTarea()">+</button>
        </div>

        <div id="lista-tareas" class="task-list"></div>
        <button style="background:transparent; color:#888; border:1px solid #333; width: 100%; margin-top: 15px; font-size: 12px; cursor:pointer;" onclick="borrarMarcados()">Limpiar tareas terminadas</button>
    </div>

    <script>
        function mostrarVista(id) {
            document.getElementById('vista-login').classList.add('hidden');
            document.getElementById('vista-eden').classList.add('hidden');
            document.getElementById('vista-agenda').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function validarAcceso() {
            const u = document.getElementById('user-in').value.trim();
            const p = document.getElementById('pass-in').value.trim();
            const savedPass = localStorage.getItem('user_' + u);
            if ((u === 'admin' && p === '1234') || savedPass === p) {
                document.body.style.backgroundImage = "url('fondo1.jpg')"; 
                mostrarVista('vista-agenda');
                cargarTareas();
            } else { alert("Usuario o contraseña incorrectos"); }
        }

        function cerrarSesion() {
            document.body.style.backgroundImage = "url('fondo.jpg')";
            mostrarVista('vista-login');
        }

        function ejecutarRegistro() {
            const u = document.getElementById('user-reg').value.trim();
            const p = document.getElementById('pass-reg').value.trim();
            if(u && p) {
                localStorage.setItem('user_' + u, p);
                alert("¡Cuenta creada correctamente!");
                mostrarVista('vista-login');
            }
        }

        function añadirTarea() {
            const input = document.getElementById('campo-tarea');
            if(input.value.trim()) {
                let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
                tareas.unshift({text: input.value.trim(), done: false}); // unshift para poner la nueva ARRIBA
                localStorage.setItem('tareas_eden', JSON.stringify(tareas));
                input.value = '';
                cargarTareas();
            }
        }

        function cargarTareas() {
            const lista = document.getElementById('lista-tareas');
            lista.innerHTML = '';
            let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
            tareas.forEach((t, i) => {
                lista.innerHTML += `
                    <div class="task-item">
                        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTarea(${i})">
                        <div class="task-text" style="${t.done ? 'text-decoration: line-through; color: #666;' : ''}">${t.text}</div>
                    </div>`;
            });
        }

        function toggleTarea(i) {
            let tareas = JSON.parse(localStorage.getItem('tareas_eden'));
            tareas[i].done = !tareas[i].done;
            localStorage.setItem('tareas_eden', JSON.stringify(tareas));
            cargarTareas();
        }

        function borrarMarcados() {
            let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
            tareas = tareas.filter(t => !t.done);
            localStorage.setItem('tareas_eden', JSON.stringify(tareas));
            cargarTareas();
        }
    </script>
</body>
</html>
