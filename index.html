<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA EDEN</title>
    <style>
        /* FONDO CON TU IMAGEN */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            /* IMPORTANTE: La foto debe llamarse fondo.jpg y estar al lado de este archivo */
            background-image: url('fondo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #121212; /* Color de respaldo por si la foto tarda en cargar */
        }

        /* CAPA PARA QUE EL TEXTO SE LEA BIEN */
        .container {
            width: 360px;
            text-align: center;
            background: rgba(15, 15, 15, 0.85); 
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 { margin-top: 0; color: #2196F3; }
        .eden-title { color: #00FFFF; font-style: italic; font-size: 30px; font-weight: bold; }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #444;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            outline: none;
        }

        button {
            width: 98%;
            padding: 12px;
            margin: 15px 0 5px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
        }

        .btn-blue { background: #2196F3; color: white; }
        .btn-cyan { background: #00FFFF; color: black; }
        .btn-red { background: #ff4444; color: white; width: auto; padding: 5px 15px; }

        .hidden { display: none; }
        .task-list { text-align: left; max-height: 300px; overflow-y: auto; margin-top: 20px; }
        .task-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="vista-login" class="container">
        <h1>INICIO DE SESIÓN</h1>
        <input type="text" id="user-in" placeholder="Usuario">
        <input type="password" id="pass-in" placeholder="Contraseña">
        <button class="btn-blue" onclick="validarAcceso()">ENTRAR</button>
        <p style="cursor:pointer; color:#2196F3; font-size: 14px;" onclick="mostrarVista('vista-eden')">¿No tienes cuenta? REGÍSTRATE AQUÍ</p>
    </div>

    <div id="vista-eden" class="container hidden">
        <div class="eden-title">BIENVENIDOS AL EDEN</div>
        <h3 style="color:#00FFFF;">REGÍSTRATE</h3>
        <input type="text" id="user-reg" placeholder="Nuevo Usuario">
        <input type="password" id="pass-reg" placeholder="Nueva Contraseña">
        <button class="btn-cyan" onclick="ejecutarRegistro()">CREAR CUENTA</button>
        <p style="cursor:pointer; color:#00FFFF; font-size: 14px;" onclick="mostrarVista('vista-login')">Volver al Login</p>
    </div>

    <div id="vista-agenda" class="container hidden" style="width: 420px; background: rgba(10, 10, 10, 0.9);">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h2 style="color:#2196F3; margin:0;">MIS TAREAS</h2>
            <button class="btn-red" onclick="mostrarVista('vista-login')">SALIR</button>
        </div>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <input type="text" id="campo-tarea" placeholder="Nueva tarea..." style="margin:0;">
            <button class="btn-blue" style="width:60px; margin:0;" onclick="añadirTarea()">+</button>
        </div>
        <button style="background:orange; color:white; width: 100%; margin-top: 10px;" onclick="borrarMarcados()">BORRAR MARCADOS</button>
        <div id="lista-tareas" class="task-list"></div>
    </div>

    <script>
        function mostrarVista(id) {
            document.getElementById('vista-login').classList.add('hidden');
            document.getElementById('vista-eden').classList.add('hidden');
            document.getElementById('vista-agenda').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function ejecutarRegistro() {
            const u = document.getElementById('user-reg').value.trim();
            const p = document.getElementById('pass-reg').value.trim();
            if(u && p) {
                localStorage.setItem('user_' + u, p);
                alert("¡Cuenta creada!");
                mostrarVista('vista-login');
            }
        }

        function validarAcceso() {
            const u = document.getElementById('user-in').value.trim();
            const p = document.getElementById('pass-in').value.trim();
            const savedPass = localStorage.getItem('user_' + u);
            if ((u === 'admin' && p === '1234') || savedPass === p) {
                mostrarVista('vista-agenda');
                cargarTareas();
            } else { alert("Datos incorrectos"); }
        }

        function añadirTarea() {
            const input = document.getElementById('campo-tarea');
            if(input.value.trim()) {
                let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
                tareas.push({text: input.value.trim(), done: false});
                localStorage.setItem('tareas_eden', JSON.stringify(tareas));
                input.value = '';
                cargarTareas();
            }
        }

        function cargarTareas() {
            const lista = document.getElementById('lista-tareas');
            lista.innerHTML = '';
            let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
            tareas.forEach((t, i) => {
                lista.innerHTML += `<div class="task-item"><input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTarea(${i})">${t.text}</div>`;
            });
        }

        function toggleTarea(i) {
            let tareas = JSON.parse(localStorage.getItem('tareas_eden'));
            tareas[i].done = !tareas[i].done;
            localStorage.setItem('tareas_eden', JSON.stringify(tareas));
        }

        function borrarMarcados() {
            let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
            tareas = tareas.filter(t => !t.done);
            localStorage.setItem('tareas_eden', JSON.stringify(tareas));
            cargarTareas();
        }
    </script>
</body>
</html>
