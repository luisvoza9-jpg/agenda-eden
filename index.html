<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AGENDA EDÉN | LUIS BOZA SOLANES | HABITACIÓN PRO</title>
    
    <style>
        :root {
            --celestial-base: #000b1a;
            --cyber-neon: #00ffff;
            --cyber-pink: #ff00ff;
            --oro-edén: #ffd700;
            --cristal-bg: rgba(255, 255, 255, 0.08);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--celestial-base); font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: white; user-select: none; }

        /* 🌌 FONDO Y NUBES MEJORADAS */
        #fondo-celestial { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at center, #001a33 0%, #00050a 100%); }
        .nube { position: absolute; background: white; filter: blur(50px); border-radius: 50%; opacity: 0.1; animation: flotar 20s infinite alternate; }

        @keyframes flotar { from { transform: translate(0, 0); } to { transform: translate(50px, 20px); } }

        /* 💎 ESCENARIO CYBERIKA */
        #escenario { position: relative; width: 100vw; height: 100vh; perspective: 1200px; z-index: 1; overflow: hidden; }
        #suelo { position: absolute; bottom: 0; width: 100%; height: 50%; background: linear-gradient(180deg, rgba(0, 255, 255, 0.15) 0%, rgba(0,0,0,0.8) 100%); transform: rotateX(60deg); transform-origin: bottom; border-top: 3px solid var(--cyber-neon); box-shadow: 0 -20px 60px rgba(0, 255, 255, 0.4); z-index: -1; }
        
        /* Efecto de escaneo en el suelo */
        #suelo::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--cyber-neon); box-shadow: 0 0 15px var(--cyber-neon); animation: scan 4s linear infinite; }
        @keyframes scan { 0% { top: 0; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }

        /* 🟨 JUGADOR LUIS BOZA */
        #jugador { position: absolute; width: 45px; height: 45px; background: rgba(255,255,255,0.9); border: 3px solid var(--cyber-pink); border-radius: 12px; box-shadow: 0 0 20px var(--cyber-pink); left: 50%; top: 60%; transform: translate(-50%, -50%); transition: all 0.1s linear; z-index: 10; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; font-size: 10px; }

        /* 🖼️ MUEBLES Y OBJETOS (TUS PIEZAS) */
        .objeto-interactivo { position: absolute; border: 2px solid var(--cyber-neon); border-radius: 8px; background: var(--cristal-bg); backdrop-filter: blur(5px); box-shadow: 0 0 15px rgba(0, 255, 255, 0.2); transition: 0.3s; }
        .objeto-interactivo::after { content: attr(data-label); position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-size: 11px; color: var(--cyber-neon); text-transform: uppercase; letter-spacing: 1px; width: 150px; text-align: center; }

        #cama { width: 140px; height: 80px; left: 10%; top: 50%; }
        #consola { width: 70px; height: 70px; right: 15%; top: 45%; border-color: var(--cyber-pink); }
        #nevera { width: 50px; height: 90px; left: 48%; top: 38%; }
        #mesa-trabajo { width: 120px; height: 60px; right: 10%; top: 70%; border-color: var(--oro-edén); }

        /* 🖥️ UI SUPERIOR */
        #ui-top { position: absolute; top: 15px; left: 15px; z-index: 100; width: calc(100% - 30px); display: flex; justify-content: space-between; pointer-events: none; }
        .stat-container { width: 180px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .stat-bar-container { width: 100%; height: 8px; background: #222; border-radius: 4px; margin: 5px 0; overflow: hidden; }
        .stat-fill { height: 100%; transition: width 0.5s ease; }

        #nombre-jugador { color: var(--oro-edén); font-weight: bold; font-size: 20px; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); text-transform: uppercase; }
        #saldo { color: var(--cyber-neon); font-size: 16px; margin-top: 5px; font-family: monospace; }

        /* 🎮 CONTROLES */
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; z-index: 200; }
        #joystick-base { width: 100%; height: 100%; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; position: relative; }
        #joystick-stick { width: 40px; height: 40px; background: white; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px white; }

        #btn-interact { position: absolute; bottom: 50px; right: 40px; width: 80px; height: 80px; background: rgba(0, 255, 255, 0.1); border: 3px solid var(--cyber-neon); border-radius: 50%; color: var(--cyber-neon); font-size: 32px; z-index: 200; display: none; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(5px); }

        /* 🎬 INTRO */
        #intro-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 2s; }
        #intro-text { color: var(--oro-edén); font-size: 18px; letter-spacing: 5px; animation: pulse 2s infinite; }
        #intro-name { color: var(--cyber-neon); font-size: 40px; font-weight: bold; margin-top: 10px; text-shadow: 0 0 20px var(--cyber-neon); }

        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="fondo-celestial">
        <div class="nube" style="width: 300px; height: 200px; top: 10%; left: 10%;"></div>
        <div class="nube" style="width: 400px; height: 250px; top: 40%; right: 10%;"></div>
    </div>
    
    <div id="escenario">
        <div id="suelo"></div>
        <div id="cama" class="objeto-interactivo" data-label="Cápsula de Sueño" data-action="dormir"></div>
        <div id="consola" class="objeto-interactivo" data-label="Terminal de Hackeo" data-action="jugar"></div>
        <div id="nevera" class="objeto-interactivo" data-label="Sintetizador Alimento" data-action="comer"></div>
        <div id="mesa-trabajo" class="objeto-interactivo" data-label="Mesa de Proyectos" data-action="trabajar"></div>
        <div id="jugador">LUIS</div>
    </div>

    <div id="ui-top">
        <div class="stat-container">
            <div class="stat-bar-container"><div id="vida-bar" class="stat-fill" style="width: 100%; background: #ff4d4d;"></div></div>
            <div class="stat-bar-container"><div id="hambre-bar" class="stat-fill" style="width: 100%; background: #ffa333;"></div></div>
            <div class="stat-bar-container"><div id="energia-bar" class="stat-fill" style="width: 100%; background: #ffff33;"></div></div>
        </div>
        <div style="text-align: right;">
            <div id="nombre-jugador">LUIS BOZA SOLANES</div>
            <div id="saldo">EDEMS: <span id="edems-val">384</span></div>
        </div>
    </div>

    <div id="joystick-zone"><div id="joystick-base"><div id="joystick-stick"></div></div></div>
    <div id="btn-interact">F</div>

    <div id="intro-screen">
        <div id="intro-text">ENTRANDO AL EDÉN DE</div>
        <div id="intro-name">LUIS BOZA SOLANES</div>
    </div>

    <script>
        // --- LOGICA DE TU "CÓDIGO MADRE" ---
        let stats = { vida: 100, hambre: 100, energia: 100, edems: 384 };
        let playerPos = { x: 50, y: 65 };
        let interactAccion = '';

        // Inicio
        setTimeout(() => {
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('intro-screen').style.display = 'none'; }, 2000);
            iniciarCicloVital();
        }, 4000);

        function iniciarCicloVital() {
            setInterval(() => {
                stats.hambre -= 0.5;
                stats.energia -= 0.3;
                if(stats.hambre <= 0) stats.vida -= 1;
                actualizarUI();
            }, 5000);
        }

        // Movimiento suave (Mejorado de lo tuyo)
        const stick = document.getElementById('joystick-stick');
        let moveX = 0, moveY = 0;

        document.getElementById('joystick-base').addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const base = e.currentTarget.getBoundingClientRect();
            const centerX = base.left + base.width/2;
            const centerY = base.top + base.height/2;
            moveX = (touch.clientX - centerX) / 10;
            moveY = (touch.clientY - centerY) / 10;
            
            // Limitar stick visualmente
            let visualX = touch.clientX - centerX;
            let visualY = touch.clientY - centerY;
            const dist = Math.sqrt(visualX**2 + visualY**2);
            if(dist > 40) { visualX *= 40/dist; visualY *= 40/dist; }
            stick.style.transform = `translate(calc(-50% + ${visualX}px), calc(-50% + ${visualY}px))`;

            playerPos.x += moveX * 0.2;
            playerPos.y += moveY * 0.2;
            actualizarPosicion();
        });

        document.addEventListener('touchend', () => {
            stick.style.transform = `translate(-50%, -50%)`;
            moveX = 0; moveY = 0;
        });

        // Teclado PC
        document.addEventListener('keydown', (e) => {
            if(e.key == 'w') playerPos.y -= 2;
            if(e.key == 's') playerPos.y += 2;
            if(e.key == 'a') playerPos.x -= 2;
            if(e.key == 'd') playerPos.x += 2;
            actualizarPosicion();
        });

        function actualizarPosicion() {
            if(playerPos.x < 5) playerPos.x = 5; if(playerPos.x > 95) playerPos.x = 95;
            if(playerPos.y < 40) playerPos.y = 40; if(playerPos.y > 90) playerPos.y = 90;
            const p = document.getElementById('jugador');
            p.style.left = playerPos.x + '%';
            p.style.top = playerPos.y + '%';
            checkInteraccion();
        }

        function checkInteraccion() {
            const pRect = document.getElementById('jugador').getBoundingClientRect();
            const btn = document.getElementById('btn-interact');
            let detectado = false;
            
            document.querySelectorAll('.objeto-interactivo').forEach(obj => {
                const oRect = obj.getBoundingClientRect();
                if(!(pRect.right < oRect.left || pRect.left > oRect.right || pRect.bottom < oRect.top || pRect.top > oRect.bottom)) {
                    detectado = true;
                    interactAccion = obj.getAttribute('data-action');
                }
            });

            if(detectado) {
                btn.style.display = 'flex';
                btn.innerText = interactAccion == 'comer' ? '🍎' : (interactAccion == 'dormir' ? '💤' : '⚡');
            } else {
                btn.style.display = 'none';
            }
        }

        document.getElementById('btn-interact').addEventListener('click', () => {
            if(interactAccion == 'comer') { stats.hambre = 100; stats.edems -= 5; }
            if(interactAccion == 'dormir') { stats.energia = 100; }
            if(interactAccion == 'jugar') { stats.edems += 20; alert("¡Hackeo completado! +20 Edems"); }
            actualizarUI();
        });

        function actualizarUI() {
            document.getElementById('vida-bar').style.width = stats.vida + '%';
            document.getElementById('hambre-bar').style.width = stats.hambre + '%';
            document.getElementById('energia-bar').style.width = stats.energia + '%';
            document.getElementById('edems-val').innerText = Math.floor(stats.edems);
        }
    </script>
</body>
</html>
