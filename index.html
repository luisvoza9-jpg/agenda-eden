<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIENVENIDOS AL EDÉN</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif;
            /* CAMBIA AQUÍ TU FONDO A NUBES/CIELO */
            background-image: url('fondo-nubes.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 1s ease;
            position: relative;
            overflow: hidden;
        }

        /* Capa sutil para aclarar el fondo si es necesario */
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.1);
            z-index: -1;
        }

        /* --- CONTENEDOR TOTALMENTE INVISIBLE --- */
        .container {
            width: 350px; 
            text-align: center;
            background: transparent !important;
            padding: 25px;
            z-index: 1;
        }

        h1 { color: #2196F3; margin-bottom: 20px; font-size: 26px; text-shadow: 1px 1px 3px rgba(255,255,255,0.8); }
        h3 { color: #2196F3 !important; margin: 0; font-size: 18px; }

        input {
            width: 85%; padding: 12px; margin: 10px 0; border-radius: 10px;
            border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255, 255, 255, 0.8) !important;
            color: #333; font-size: 16px; outline: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        button { padding: 10px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .btn-blue { background: #2196F3; color: white; width: 100%; box-shadow: 0 4px 10px rgba(33, 150, 243, 0.2); }
        .btn-cyan { background: #00BCD4; color: white; width: 100%; }
        .btn-red { background: #ff4444; color: white; padding: 6px 12px; font-size: 11px; border-radius: 20px; }

        .hidden { display: none; }

        /* === ESTILOS DE LAS NOTAS FLOTANTES === */
        .task-list { 
            text-align: left !important; 
            max-height: 400px; 
            overflow-y: auto; margin-top: 20px; 
        }

        .task-item { 
            display: flex !important; align-items: center !important; justify-content: flex-start !important;
            background: white !important; 
            margin-bottom: 12px; 
            padding: 14px !important;
            border-radius: 12px;
            /* SOMBRA PARA QUE FLOTEN SOBRE EL CIELO */
            box-shadow: 0 6px 15px rgba(0,0,0,0.07) !important;
            border: 1px solid rgba(0,0,0,0.02) !important;
            transition: 0.3s;
        }

        .task-item:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1) !important; }

        .task-text { 
            flex: 1 !important; text-align: left !important; 
            margin-left: 12px !important; font-size: 15px !important; 
            line-height: 1.4 !important; word-break: break-word !important; 
            color: #444 !important; 
        }

        input[type="checkbox"] { 
            width: 18px !important; height: 18px !important; 
            flex-shrink: 0 !important; cursor: pointer; 
            accent-color: #2196F3;
        }

        .frase-secreta { font-size: 12px; color: #555; margin-top: 25px; margin-bottom: 10px; font-style: italic; }

        /* === ICONO BASURA 🗑️ === */
        .btn-trash {
            background: transparent !important;
            color: #ff4444 !important;
            font-size: 28px !important;
            padding: 10px !important;
            width: fit-content;
            margin: 20px auto 0 auto !important;
            display: block;
            border-radius: 50%;
            transition: 0.3s;
        }
        .btn-trash:hover { transform: scale(1.2) rotate(10deg); filter: drop-shadow(0 0 5px rgba(255,0,0,0.2)); }

        .task-list::-webkit-scrollbar { width: 4px; }
        .task-list::-webkit-scrollbar-thumb { background: #2196F3; border-radius: 10px; }
    </style>
</head>
<body id="cuerpo">

    <div id="vista-login" class="container">
        <h1>BIENVENIDOS AL EDÉN</h1>
        <input type="text" id="user-in" placeholder="Usuario">
        <input type="password" id="pass-in" placeholder="Contraseña">
        <button class="btn-cyan" onclick="validarAcceso()">ENTRAR</button>
        <p class="frase-secreta">(Un paraíso para tus secretos te espera en el edén)</p>
        <p style="cursor:pointer; color:#2196F3; font-size: 12px;" onclick="mostrarVista('vista-eden')">REGISTRARSE</p>
    </div>

    <div id="vista-eden" class="container hidden">
        <h2 style="color:#2196F3; font-size: 20px;">REGISTRO</h2>
        <input type="text" id="user-reg" placeholder="Nuevo usuario">
        <input type="password" id="pass-reg" placeholder="Contraseña">
        <button class="btn-blue" onclick="ejecutarRegistro()">GUARDAR</button>
        <p style="cursor:pointer; color:#777; margin-top:15px; font-size: 12px;" onclick="mostrarVista('vista-login')">Volver</p>
    </div>

    <div id="vista-agenda" class="container hidden">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 style="margin:0;">MIS NOTAS</h3>
            <button class="btn-red" onclick="cerrarSesion()">SALIR</button>
        </div>
        
        <div style="display:flex; gap:8px;">
            <input type="text" id="campo-tarea" placeholder="Nueva nota..." style="margin:0; flex-grow:1;">
            <button class="btn-blue" style="width:45px; margin:0;" onclick="añadirTarea()">+</button>
        </div>

        <div id="lista-tareas" class="task-list"></div>
        
        <button class="btn-trash" onclick="borrarMarcados()" title="Limpiar notas">🗑️</button>
    </div>

    <script>
        function mostrarVista(id) {
            document.getElementById('vista-login').classList.add('hidden');
            document.getElementById('vista-eden').classList.add('hidden');
            document.getElementById('vista-agenda').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function validarAcceso() {
            const u = document.getElementById('user-in').value.trim();
            const p = document.getElementById('pass-in').value.trim();
            const savedPass = localStorage.getItem('user_' + u);
            if ((u === 'admin' && p === '1234') || savedPass === p) {
                document.getElementById('cuerpo').style.backgroundImage = "url('fondo1.jpg')"; 
                mostrarVista('vista-agenda');
                cargarTareas();
            } else { alert("Datos incorrectos"); }
        }

        function cerrarSesion() {
            document.getElementById('cuerpo').style.backgroundImage = "url('fondo-nubes.jpg')";
            mostrarVista('vista-login');
        }

        function ejecutarRegistro() {
            const u = document.getElementById('user-reg').value.trim();
            const p = document.getElementById('pass-reg').value.trim();
            if(u && p) {
                localStorage.setItem('user_' + u, p);
                alert("Usuario guardado");
                mostrarVista('vista-login');
            }
        }

        function añadirTarea() {
            const input = document.getElementById('campo-tarea');
            if(input.value.trim()) {
                let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
                tareas.unshift({text: input.value.trim(), done: false}); 
                localStorage.setItem('tareas_eden', JSON.stringify(tareas));
                input.value = '';
                cargarTareas();
            }
        }

        function cargarTareas() {
            const lista = document.getElementById('lista-tareas');
            lista.innerHTML = '';
            let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
            tareas.forEach((t, i) => {
                const item = document.createElement('div');
                item.className = 'task-item';
                item.innerHTML = `
                    <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTarea(${i})">
                    <div class="task-text" style="${t.done ? 'text-decoration: line-through; color: #888;' : ''}">${t.text}</div>`;
                lista.appendChild(item);
            });
        }

        function toggleTarea(i) {
            let tareas = JSON.parse(localStorage.getItem('tareas_eden'));
            tareas[i].done = !tareas[i].done;
            localStorage.setItem('tareas_eden', JSON.stringify(tareas));
            cargarTareas();
        }

        function borrarMarcados() {
            let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
            tareas = tareas.filter(t => !t.done);
            localStorage.setItem('tareas_eden', JSON.stringify(tareas));
            cargarTareas();
        }
    </script>
</body>
</html>
