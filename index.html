<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIENVENIDOS AL EDÉN</title>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background: #000; /* Fondo negro puro */
            overflow: hidden;
            position: relative;
            background-size: cover;
            background-position: center;
            transition: background-image 1.2s ease-in-out;
        }

        /* Vídeo de fondo */
        #video-fondo {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: -1;
            transition: opacity 1s ease-in-out;
            background: black;
        }

        .container {
            width: 350px; text-align: center;
            background: transparent; padding: 25px;
            z-index: 1;
            animation: fadeIn 1.2s ease-out;
        }

        /* Estilo Login Neón */
        #vista-login h1, #vista-eden h2 { 
            color: #00FFFF; margin-bottom: 20px; font-size: 28px; 
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.6); 
        }

        #vista-login input, #vista-eden input {
            width: 85%; padding: 12px; margin: 10px 0; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.3); background: rgba(0, 0, 0, 0.6);
            color: white; font-size: 16px; outline: none; transition: 0.3s;
        }

        #vista-login input:focus, #vista-eden input:focus {
            border-color: #00FFFF;
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.5);
        }
        
        button { padding: 12px; cursor: pointer; border: none; border-radius: 10px; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-cyan { background: #00FFFF; color: black; box-shadow: 0 4px 10px rgba(0, 255, 255, 0.2); }
        .frase-secreta { font-size: 12px; color: #ccc; margin-top: 25px; font-style: italic; }
        .hidden { display: none; }

        /* Estilo Agenda */
        #vista-agenda {
            background: rgba(255,255,255,0.9);
            border-radius: 20px;
            color: #333;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }

        .btn-exit {
            background: transparent; font-size: 24px; width: auto; 
            cursor: pointer; transition: 0.3s; border: none;
        }
        .btn-exit:hover { transform: scale(1.2); }

        #vista-agenda h3 { color: #2196F3; margin: 0; }
        #vista-agenda input {
            width: 75%; padding: 10px; border-radius: 8px;
            border: 1px solid #ddd; background: white; color: #333;
        }

        .btn-blue { background: #2196F3; color: white; width: auto; padding: 10px 15px; }

        .task-list { text-align: left; max-height: 350px; overflow-y: auto; margin-top: 15px; }
        .task-item { 
            background: white; margin-bottom: 8px; padding: 12px;
            border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex; align-items: center;
        }
        .task-text { flex: 1; margin-left: 10px; font-size: 15px; color: #444; }

        .btn-trash {
            position: fixed; bottom: 40px; right: 40px;
            background: transparent !important; color: #ff4444 !important;
            font-size: 45px !important; cursor: pointer; border: none;
            z-index: 100; filter: drop-shadow(0 2px 10px rgba(0,0,0,0.2));
            transition: 0.3s;
        }
    </style>
</head>
<body id="cuerpo">

    <video id="video-fondo" autoplay muted playsinline preload="auto">
        <source src="intro.mp4" type="video/mp4">
        Tu navegador no soporta el vídeo.
    </video>

    <div id="vista-login" class="container">
        <h1>BIENVENIDOS AL EDÉN</h1>
        <input type="text" id="user-in" placeholder="Usuario">
        <input type="password" id="pass-in" placeholder="Contraseña">
        <button class="btn-cyan" onclick="validarAcceso()">ENTRAR</button>
        <p class="frase-secreta">(Un paraíso para tus secretos te espera en el edén)</p>
        <p style="cursor:pointer; color:#00FFFF; font-size: 12px; margin-top: 15px;" onclick="mostrarVista('vista-eden')">REGISTRARSE</p>
    </div>

    <div id="vista-eden" class="container hidden">
        <h2>REGISTRO</h2>
        <input type="text" id="user-reg" placeholder="Nuevo usuario">
        <input type="password" id="pass-reg" placeholder="Contraseña">
        <button class="btn-cyan" onclick="ejecutarRegistro()">GUARDAR</button>
        <p style="cursor:pointer; color:#ccc; margin-top:15px; font-size: 12px;" onclick="mostrarVista('vista-login')">Volver</p>
    </div>

    <div id="vista-agenda" class="container hidden">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3>MIS NOTAS</h3>
            <button class="btn-exit" onclick="cerrarSesion()">🚪</button>
        </div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="campo-tarea" placeholder="Nueva nota...">
            <button class="btn-blue" onclick="añadirTarea()">+</button>
        </div>
        <div id="lista-tareas" class="task-list"></div>
    </div>

    <button class="btn-trash hidden" id="btn-borrar" onclick="borrarMarcados()">🗑️</button>

    <script>
        const video = document.getElementById('video-fondo');
        const cuerpo = document.getElementById('cuerpo');
        const btnBorrar = document.getElementById('btn-borrar');

        // Intento forzado de reproducción al cargar
        window.addEventListener('load', () => {
            video.play().catch(() => {
                console.log("El vídeo necesita un clic para arrancar en algunos navegadores.");
            });
        });

        video.onended = () => { video.pause(); };

        function mostrarVista(id) {
            document.getElementById('vista-login').classList.add('hidden');
            document.getElementById('vista-eden').classList.add('hidden');
            document.getElementById('vista-agenda').classList.add('hidden');
            btnBorrar.classList.add('hidden');

            document.getElementById(id).classList.remove('hidden');
            
            if (id === 'vista-agenda') {
                video.style.opacity = '0';
                cuerpo.style.backgroundImage = "url('fondo-nubes.jpg')";
                btnBorrar.classList.remove('hidden');
            } else {
                video.style.opacity = '1';
                cuerpo.style.backgroundImage = "none";
                video.play().catch(() => {});
            }
        }

        function validarAcceso() {
            const u = document.getElementById('user-in').value.trim();
            const p = document.getElementById('pass-in').value.trim();
            const savedPass = localStorage.getItem('user_' + u);
            if ((u === 'admin' && p === '1234') || savedPass === p) {
                mostrarVista('vista-agenda');
                cargarTareas();
            } else { alert("Datos incorrectos"); }
        }

        function cerrarSesion() { mostrarVista('vista-login'); }

        function ejecutarRegistro() {
            const u = document.getElementById('user-reg').value.trim();
            const p = document.getElementById('pass-reg').value.trim();
            if(u && p) {
                localStorage.setItem('user_' + u, p);
                alert("Usuario registrado");
                mostrarVista('vista-login');
            }
        }

        function añadirTarea() {
            const input = document.getElementById('campo-tarea');
            if(input.value.trim()) {
                let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
                tareas.unshift({text: input.value.trim(), done: false}); 
                localStorage.setItem('tareas_eden', JSON.stringify(tareas));
                input.value = '';
                cargarTareas();
            }
        }

        function cargarTareas() {
            const lista = document.getElementById('lista-tareas');
            lista.innerHTML = '';
            let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
            tareas.forEach((t, i) => {
                const item = document.createElement('div');
                item.className = 'task-item';
                item.innerHTML = `
                    <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTarea(${i})">
                    <div class="task-text" style="${t.done ? 'text-decoration:line-through; color:gray;' : ''}">${t.text}</div>`;
                lista.appendChild(item);
            });
        }

        function toggleTarea(i) {
            let tareas = JSON.parse(localStorage.getItem('tareas_eden'));
            tareas[i].done = !tareas[i].done;
            localStorage.setItem('tareas_eden', JSON.stringify(tareas));
            cargarTareas();
        }

        function borrarMarcados() {
            let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
            tareas = tareas.filter(t => !t.done);
            localStorage.setItem('tareas_eden', JSON.stringify(tareas));
            cargarTareas();
        }

        mostrarVista('vista-login');
    </script>
</body>
</html>
