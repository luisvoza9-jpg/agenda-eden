<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIENVENIDOS AL EDÉN (ULTRA GAME GLOBAL)</title>
    <style>
        /* ESTILO ORIGINAL INTACTO */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif; background-image: url('fondo-nubes.jpg');
            background-size: cover; background-position: center; overflow: hidden; color: white;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 1; }
        .container { width: 380px; text-align: center; position: relative; z-index: 10; }
        h1 { color: #00FFFF; margin-bottom: 20px; font-size: 32px; text-shadow: 0 0 15px #00FFFF; display: flex; flex-direction: column; align-items: center; letter-spacing: 2px; font-weight: bold; line-height: 1.1; min-height: 110px; }
        h1 span { display: block; width: 100%; }
        .frase-neon { color: #00FFFF; font-size: 14px; text-shadow: 0 0 10px #00FFFF; display: block; margin-top: 20px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #00FFFF; background: rgba(0, 0, 0, 0.7); color: white; font-size: 16px; outline: none; text-align: center; }
        .btn-exit-fixed { position: fixed; top: 25px; right: 25px; color: #ff4444; cursor: pointer; border: none; background: none; display: flex; flex-direction: column; align-items: center; z-index: 1000; transition: 0.3s; }
        .btn-blue { background: #00FFFF; color: black; width: 55px; font-size: 24px; border-radius: 10px; border: none; cursor: pointer; height: 45px; }
        .task-list { text-align: left; margin-top: 20px; max-height: 250px; overflow-y: auto; }
        .task-item { background: rgba(0, 0, 0, 0.6); margin-bottom: 8px; padding: 12px; border-radius: 10px; display: flex; align-items: center; border: 1px solid rgba(0, 255, 255, 0.2); }
        .task-text { flex: 1; margin-left: 10px; color: white; word-break: break-word; }
        .btn-trash-central { position: fixed; bottom: 30px; right: 30px; background: none; color: #ff4444; font-size: 50px; border: none; filter: drop-shadow(0 0 10px #ff4444); cursor: pointer; z-index: 100; }
        .hidden { display: none !important; }
        
        /* BOTÓN RANKING */
        .btn-rank-flotante { position: fixed; bottom: 30px; left: 100px; background: none; color: #FFD700; font-size: 40px; border: none; filter: drop-shadow(0 0 10px #FFD700); cursor: pointer; z-index: 101; transition: 0.3s; }
        .btn-game-flotante { position: fixed; bottom: 30px; left: 30px; background: none; color: #00FFFF; font-size: 40px; border: none; filter: drop-shadow(0 0 10px #00FFFF); cursor: pointer; z-index: 101; transition: 0.3s; }

        /* VISTA JUEGO Y MENÚS */
        #vista-juego { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #gameCanvas { border: 3px solid #00FFFF; box-shadow: 0 0 30px #00FFFF; background: #000; }
        #difficulty-menu, #game-over-menu, #vista-ranking { position: absolute; background: rgba(0,0,0,0.95); border: 2px solid #00FFFF; padding: 25px; border-radius: 20px; text-align: center; z-index: 1010; width: 320px; }
        .game-btn-neon { background: none; border: 1px solid #00FFFF; color: #00FFFF; padding: 10px; margin: 5px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        
        /* TABLAS RANKING */
        .rank-table { width: 100%; margin-top: 10px; border-collapse: collapse; font-size: 14px; }
        .rank-table th { color: #00FFFF; border-bottom: 1px solid #00FFFF; padding: 5px; }
        .rank-table td { padding: 5px; border-bottom: 1px solid rgba(0,255,255,0.1); }
        .rank-title { color: #FFD700; font-size: 16px; margin-top: 15px; text-transform: uppercase; }
        
        @keyframes borrarVuelo { to { transform: scale(0) translate(20vw, 50vh); opacity: 0; } }
        .arrugando { animation: borrarVuelo 0.6s ease-in forwards; }
    </style>
</head>
<body>

    <div id="pantalla-oscura" class="overlay"></div>

    <button id="exit-btn" class="btn-exit-fixed hidden" onclick="cerrarSesion()">
        <span style="font-size:32px">🚪</span><span style="font-size:10px; font-weight:bold">EXIT</span>
    </button>
    
    <button class="btn-trash-central hidden" id="btn-borrar" onclick="borrarMarcados()">🗑️</button>
    <button id="game-btn" class="btn-game-flotante hidden" onclick="abrirMenuDificultad()">🎮</button>
    <button id="rank-btn" class="btn-rank-flotante hidden" onclick="abrirRanking()">🏆</button>

    <div id="vista-login" class="container">
        <h1 id="titulo-eden"></h1>
        <input type="text" id="user-in" placeholder="Usuario">
        <input type="password" id="pass-in" placeholder="Contraseña">
        <button style="background:#00FFFF; color:black; width:100%; height:45px; border-radius:10px; font-weight:bold; border:none; cursor:pointer;" onclick="validarAcceso()">ENTRAR</button>
        <p style="cursor:pointer; color:#ccc; font-size: 12px; margin-top: 20px;" onclick="mostrarVista('vista-eden')">Registrarse</p>
    </div>

    <div id="vista-eden" class="container hidden">
        <h2 style="color:#00FFFF; margin-bottom:15px;">REGISTRO</h2>
        <input type="text" id="user-reg" placeholder="Nuevo usuario">
        <input type="password" id="pass-reg" placeholder="Contraseña">
        <button style="background:#00FFFF; color:black; width:100%; height:45px; border-radius:10px; font-weight:bold; border:none; cursor:pointer;" onclick="ejecutarRegistro()">GUARDAR</button>
        <p style="cursor:pointer; color:#ccc; margin-top:20px;" onclick="mostrarVista('vista-login')">Volver</p>
    </div>

    <div id="vista-agenda" class="container hidden">
        <h3 style="color:#00FFFF; text-align:left; margin-bottom:10px;">MIS NOTAS</h3>
        <div style="display:flex; gap:10px;">
            <input type="text" id="campo-tarea" placeholder="Escribe algo..." style="text-align:left; padding-left:15px;">
            <button class="btn-blue" onclick="añadirTarea()">+</button>
        </div>
        <div id="lista-tareas" class="task-list"></div>
    </div>

    <div id="vista-juego" class="hidden">
        <div id="game-score" style="position:absolute; top:20px; color:#00FFFF; font-size:20px;">SCORE: 0</div>
        <canvas id="gameCanvas" width="500" height="500"></canvas>

        <div id="difficulty-menu" class="hidden">
            <h2 style="color:#00FFFF; margin-bottom:15px;">DIFICULTAD</h2>
            <button class="game-btn-neon" onclick="iniciarJuegoEden('terrestre')">Nivel terrestre</button>
            <button class="game-btn-neon" onclick="iniciarJuegoEden('semidios')">Nivel semidios</button>
            <button class="game-btn-neon" onclick="iniciarJuegoEden('eden')">Nivel del edén</button>
            <button class="game-btn-neon" style="border-color:#ff4444; color:#ff4444;" onclick="salirDelJuego()">SALIR</button>
        </div>

        <div id="game-over-menu" class="hidden">
            <h2 id="end-title" style="color:#00FFFF; margin-bottom:20px;">FIN</h2>
            <button class="game-btn-neon" onclick="abrirMenuDificultad()">¿Otra?</button>
            <button class="game-btn-neon" onclick="salirDelJuego()">Volver a Agenda</button>
        </div>

        <div id="vista-ranking" class="hidden">
            <h2 style="color:#FFD700;">SALÓN DE LA FAMA</h2>
            <div style="max-height: 350px; overflow-y: auto;">
                <div class="rank-title">🌍 Terrestre</div>
                <table class="rank-table" id="tabla-terrestre"><thead><tr><th>User</th><th>Wins</th></tr></thead><tbody></tbody></table>
                <div class="rank-title">⚡ Semidios</div>
                <table class="rank-table" id="tabla-semidios"><thead><tr><th>User</th><th>Wins</th></tr></thead><tbody></tbody></table>
                <div class="rank-title">💎 Edén</div>
                <table class="rank-table" id="tabla-eden"><thead><tr><th>User</th><th>Wins</th></tr></thead><tbody></tbody></table>
            </div>
            <button class="game-btn-neon" style="margin-top:15px;" onclick="cerrarRanking()">CERRAR</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        // CONFIGURACIÓN DE LUIS (Extraída de tu imagen)
        const firebaseConfig = {
            apiKey: "AIzaSyCod7qKXcefhTqa40EVWbl32dygU9G10Aw",
            authDomain: "edengame-5a40c.firebaseapp.com",
            databaseURL: "https://edengame-5a40c-default-rtdb.firebaseio.com",
            projectId: "edengame-5a40c",
            storageBucket: "edengame-5a40c.firebasestorage.app",
            messagingSenderId: "837651200703",
            appId: "1:837651200703:web:0c3e237c36e1bb37b6640a",
            measurementId: "G-TKMSN7EF9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentUser = "";

        // --- LÓGICA DE INTERFAZ ---
        const tituloEden = document.getElementById('titulo-eden');
        const lineas = ["BIENVENIDOS", "AL", "EDÉN"];
        function animar() {
            tituloEden.innerHTML = ""; let l=0, c=0;
            lineas.forEach(() => { let s = document.createElement('span'); tituloEden.appendChild(s); });
            let spans = tituloEden.querySelectorAll("span");
            let t = setInterval(() => {
                if(l < lineas.length){ spans[l].innerText += lineas[l][c]; c++; if(c >= lineas[l].length){ l++; c=0; } } else clearInterval(t);
            }, 100);
        }

        function mostrarVista(id) {
            document.querySelectorAll('.container, #vista-juego, #vista-ranking').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('#btn-borrar, #exit-btn, #game-btn, #rank-btn').forEach(b => b.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'vista-login') animar();
            if(id === 'vista-agenda') {
                document.querySelectorAll('#btn-borrar, #exit-btn, #game-btn, #rank-btn').forEach(b => b.classList.remove('hidden'));
                document.getElementById('pantalla-oscura').classList.add('hidden');
                cargarTareas();
            } else { document.getElementById('pantalla-oscura').classList.remove('hidden'); }
        }

        function validarAcceso() {
            const u = document.getElementById('user-in').value.trim();
            const p = document.getElementById('pass-in').value.trim();
            const saved = localStorage.getItem('user_' + u);
            if ((u === 'admin' && p === '1234') || (saved !== null && saved === p)) { 
                currentUser = u; 
                mostrarVista('vista-agenda'); 
            } else { alert("Error de acceso"); }
        }

        function ejecutarRegistro() {
            const u = document.getElementById('user-reg').value.trim();
            const p = document.getElementById('pass-reg').value.trim();
            if(u && p) { localStorage.setItem('user_' + u, p); alert("¡Registrado!"); mostrarVista('vista-login'); }
        }

        function cerrarSesion() { currentUser = ""; mostrarVista('vista-login'); }

        // --- AGENDA ---
        function añadirTarea() {
            const input = document.getElementById('campo-tarea');
            if(input.value.trim()) {
                let t = JSON.parse(localStorage.getItem('tareas_'+currentUser) || '[]');
                t.unshift({text: input.value.trim(), done: false});
                localStorage.setItem('tareas_'+currentUser, JSON.stringify(t));
                input.value = ''; cargarTareas();
            }
        }
        function cargarTareas() {
            const lista = document.getElementById('lista-tareas'); lista.innerHTML = '';
            let t = JSON.parse(localStorage.getItem('tareas_'+currentUser) || '[]');
            t.forEach((tarea, i) => {
                const item = document.createElement('div'); item.className = 'task-item'; item.id = `nota-${i}`;
                item.innerHTML = `<input type="checkbox" ${tarea.done?'checked':''} onchange="toggle(${i})"><div class="task-text" style="${tarea.done?'text-decoration:line-through;opacity:0.5':''}">${tarea.text}</div>`;
                lista.appendChild(item);
            });
        }
        function toggle(i) {
            let t = JSON.parse(localStorage.getItem('tareas_'+currentUser)); t[i].done = !t[i].done;
            localStorage.setItem('tareas_'+currentUser, JSON.stringify(t)); cargarTareas();
        }
        function borrarMarcados() {
            let t = JSON.parse(localStorage.getItem('tareas_'+currentUser) || '[]');
            t.forEach((tarea, i) => { if(tarea.done) document.getElementById(`nota-${i}`).classList.add('arrugando'); });
            setTimeout(() => { 
                t = t.filter(tarea => !tarea.done); 
                localStorage.setItem('tareas_'+currentUser, JSON.stringify(t)); 
                cargarTareas(); 
            }, 600);
        }

        // --- RANKING FIREBASE ---
        function abrirRanking() {
            mostrarVista('vista-juego');
            document.getElementById('vista-ranking').classList.remove('hidden');
            actualizarTablasRanking();
        }
        function cerrarRanking() { document.getElementById('vista-ranking').classList.add('hidden'); salirDelJuego(); }

        function registrarVictoria(nivel) {
            const ref = db.ref('ranking/' + nivel + '/' + currentUser);
            ref.transaction((currentWins) => {
                return (currentWins || 0) + 1;
            });
        }

        function actualizarTablasRanking() {
            const niveles = ['terrestre', 'semidios', 'eden'];
            niveles.forEach(nivel => {
                db.ref('ranking/' + nivel).orderByValue().limitToLast(10).once('value', snapshot => {
                    const tbody = document.querySelector(`#tabla-${nivel} tbody`);
                    tbody.innerHTML = "";
                    let players = [];
                    snapshot.forEach(child => { players.push({name: child.key, wins: child.val()}); });
                    players.reverse().forEach(p => {
                        tbody.innerHTML += `<tr><td>${p.name}</td><td>${p.wins}</td></tr>`;
                    });
                });
            });
        }

        // --- JUEGO (Lógica Mejorada) ---
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let balls = [], bricks = [], powerUps = [], gameInterval, gameActive = false;
        let paddleX, paddleWidth = 90, score = 0, currentDiff = 'terrestre', isFireBall = false;

        function abrirMenuDificultad() {
            mostrarVista('vista-juego');
            document.getElementById('difficulty-menu').classList.remove('hidden');
            document.getElementById('game-over-menu').classList.add('hidden');
        }

        function resetJuego(diff) {
            currentDiff = diff;
            score = 0; document.getElementById("game-score").innerText = "SCORE: 0";
            paddleWidth = 90; paddleX = (canvas.width - paddleWidth) / 2;
            isFireBall = false;
            let ballRadius = (diff === 'eden') ? 5 : 8;
            balls = [{ x: canvas.width/2, y: canvas.height-100, dx: 2.1, dy: -2.1, radius: ballRadius }];
            
            bricks = [];
            let rows = (diff === 'terrestre') ? 5 : (diff === 'semidios' ? 8 : 12);
            let cols = (diff === 'terrestre') ? 7 : (diff === 'semidios' ? 12 : 18);
            let bW = (canvas.width - 40) / cols;
            let bH = (diff === 'terrestre') ? 20 : 12;

            for(let c=0; c<cols; c++) {
                bricks[c] = [];
                for(let r=0; r<rows; r++) {
                    let type = "normal", life = 1;
                    if(diff === 'semidios' && Math.random() < 0.2) { type = "hard"; life = 2; }
                    if(diff === 'eden') {
                        if(Math.random() < 0.15) { type = "wall"; life = 999; }
                        else if(Math.random() < 0.3) { type = "hard"; life = 2; }
                        if(Math.random() < 0.1) life = 0;
                    }
                    bricks[c][r] = { x: c*(bW+4)+15, y: r*(bH+4)+50, w: bW-4, h: bH-4, status: life, type: type };
                }
            }
            powerUps = [];
        }

        function draw() {
            if(!gameActive) return;
            ctx.clearRect(0,0, canvas.width, canvas.height);
            let win = true;

            bricks.forEach(col => col.forEach(b => {
                if(b.status > 0) {
                    if(b.type !== "wall") win = false;
                    ctx.shadowBlur = 5;
                    ctx.fillStyle = b.type==="wall"?"#888":(b.status===2?"#FFD700":"#FF4444");
                    ctx.fillRect(b.x, b.y, b.w, b.h);
                }
            }));

            if(win) { endPartida("¡VICTORIA!"); registrarVictoria(currentDiff); }

            balls.forEach((b, i) => {
                ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2);
                ctx.fillStyle = isFireBall ? "#FFA500" : "#FF0000";
                ctx.fill(); ctx.closePath();

                if(b.x + b.dx > canvas.width-b.radius || b.x + b.dx < b.radius) b.dx = -b.dx;
                if(b.y + b.dy < b.radius) b.dy = -b.dy;
                else if(b.y + b.dy > canvas.height-80) {
                    if(b.x > paddleX && b.x < paddleX+paddleWidth) b.dy = -Math.abs(b.dy);
                    else if(b.y > canvas.height) balls.splice(i, 1);
                }

                bricks.forEach(col => col.forEach(br => {
                    if(br.status > 0 && b.x > br.x && b.x < br.x+br.w && b.y > br.y && b.y < br.y+br.h) {
                        if(!isFireBall || br.type==="wall") b.dy = -b.dy;
                        if(br.type!=="wall") {
                            br.status--;
                            if(br.status===0) {
                                score++; document.getElementById("game-score").innerText = "SCORE: "+score;
                                let prob = (currentDiff==='terrestre')?0.15:(currentDiff==='semidios'?0.07:0.03);
                                if(Math.random()<prob) powerUps.push({x:br.x+br.w/2, y:br.y, type:['P','2','F'][Math.floor(Math.random()*3)]});
                            }
                        }
                    }
                }));
                b.x += b.dx; b.y += b.dy;
            });

            powerUps.forEach((p, i) => {
                p.y += 2;
                ctx.fillStyle = "#00FFFF"; ctx.fillText(p.type, p.x, p.y);
                if(p.y > canvas.height-75 && p.x > paddleX && p.x < paddleX+paddleWidth) {
                    if(p.type==='P') { paddleWidth=180; setTimeout(()=>paddleWidth=90, 8000); }
                    if(p.type==='2') balls.push({x:paddleX+paddleWidth/2, y:canvas.height-100, dx:2.1, dy:-2.1, radius:balls[0].radius});
                    if(p.type==='F') { isFireBall=true; setTimeout(()=>isFireBall=false, 3000); }
                    powerUps.splice(i,1);
                }
            });

            ctx.fillStyle = "#00FFFF"; ctx.fillRect(paddleX, canvas.height-70, paddleWidth, 12);
            if(balls.length === 0) endPartida("GAME OVER");
        }

        document.addEventListener("mousemove", e => {
            let rect = canvas.getBoundingClientRect();
            paddleX = e.clientX - rect.left - paddleWidth/2;
        });

        function iniciarJuegoEden(diff) {
            document.getElementById('difficulty-menu').classList.add('hidden');
            resetJuego(diff); gameActive = true; gameInterval = setInterval(draw, 10);
        }

        function endPartida(msg) {
            gameActive = false; clearInterval(gameInterval);
            document.getElementById("end-title").innerText = msg;
            document.getElementById("game-over-menu").classList.remove("hidden");
        }

        function salirDelJuego() { gameActive = false; clearInterval(gameInterval); mostrarVista('vista-agenda'); }

        mostrarVista('vista-login');
    </script>
</body>
</html>
