<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIENVENIDOS AL EDÉN</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background-image: url('fondo-nubes.jpg');
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        /* Capa sutil para que el neón resalte en el login */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        .container {
            width: 380px; 
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* TITULOS NEÓN CENTRADOS */
        h1, h2 { 
            color: #00FFFF; margin-bottom: 15px; font-size: 32px; 
            text-shadow: 0 0 15px #00FFFF;
            text-align: center;
        }

        /* FRASE DEL EDÉN NEÓN */
        .frase-neon {
            color: #00FFFF;
            font-size: 14px;
            text-shadow: 0 0 10px #00FFFF;
            display: block;
            margin-top: 20px;
            text-align: center;
        }

        input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px;
            border: 1px solid #00FFFF; 
            background: rgba(0, 0, 0, 0.6);
            color: white; font-size: 16px; outline: none;
            text-align: center;
        }

        /* AGENDA TOTALMENTE TRANSPARENTE (SIN EL CUADRO BLANCO DE TU FOTO) */
        #vista-agenda {
            background: transparent !important;
            box-shadow: none !important;
            padding: 20px;
        }

        #vista-agenda h3 { 
            color: #00FFFF; text-shadow: 0 0 10px #00FFFF; 
            text-align: left; margin-bottom: 20px;
        }

        /* ENTRADA DE NOTAS A LA IZQUIERDA */
        .task-input-group { display: flex; gap: 10px; }
        #campo-tarea { 
            text-align: left; /* Volvemos a la izquierda */
            padding-left: 15px;
            flex: 1;
        }

        .btn-blue { background: #00FFFF; color: black; width: 60px; font-size: 20px; border-radius: 10px; }

        /* LISTA DE TAREAS */
        .task-list { text-align: left; margin-top: 20px; max-height: 300px; overflow-y: auto; }
        .task-item { 
            background: rgba(0, 0, 0, 0.5); /* Fondo oscuro sutil para leer bien */
            margin-bottom: 10px; padding: 15px;
            border-radius: 10px; display: flex; align-items: center;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }
        .task-text { flex: 1; margin-left: 10px; color: white; font-size: 16px; }

        /* EXIT Y PAPELERA ROJOS */
        .btn-exit-container {
            float: right; color: #ff4444; cursor: pointer; border: none; background: none;
            display: flex; flex-direction: column; align-items: center;
        }
        .exit-text { font-size: 10px; font-weight: bold; }

        .btn-trash-central {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: none; color: #ff4444; font-size: 50px; border: none; 
            filter: drop-shadow(0 0 10px #ff4444); cursor: pointer;
        }
        
        .hidden { display: none !important; }
        button:hover { opacity: 0.8; transform: scale(1.05); transition: 0.2s; }
    </style>
</head>
<body>

    <div id="pantalla-oscura" class="overlay"></div>

    <div id="vista-login" class="container">
        <h1>EDÉN</h1>
        <input type="text" id="user-in" placeholder="Usuario">
        <input type="password" id="pass-in" placeholder="Contraseña">
        <button style="background:#00FFFF; color:black; width:100%; padding:12px; border-radius:10px; font-weight:bold; border:none; cursor:pointer;" onclick="validarAcceso()">ENTRAR</button>
        <span class="frase-neon">(Un paraíso para tus secretos te espera en el edén)</span>
        <p style="cursor:pointer; color:#ccc; font-size: 12px; margin-top: 20px;" onclick="mostrarVista('vista-eden')">Registrarse</p>
    </div>

    <div id="vista-eden" class="container hidden">
        <h2>REGISTRO</h2>
        <input type="text" id="user-reg" placeholder="Nuevo usuario">
        <input type="password" id="pass-reg" placeholder="Contraseña">
        <button style="background:#00FFFF; color:black; width:100%; padding:12px; border-radius:10px; font-weight:bold; border:none; cursor:pointer;" onclick="ejecutarRegistro()">GUARDAR</button>
        <p style="cursor:pointer; color:#ccc; margin-top:20px; font-size: 12px;" onclick="mostrarVista('vista-login')">Volver</p>
    </div>

    <div id="vista-agenda" class="container hidden">
        <button class="btn-exit-container" onclick="cerrarSesion()">
            <span style="font-size:30px;">🚪</span>
            <span class="exit-text">EXIT</span>
        </button>
        <h3>MIS NOTAS</h3>
        <div class="task-input-group">
            <input type="text" id="campo-tarea" placeholder="Escribe algo...">
            <button class="btn-blue" onclick="añadirTarea()">+</button>
        </div>
        <div id="lista-tareas" class="task-list"></div>
    </div>

    <button class="btn-trash-central hidden" id="btn-borrar" onclick="borrarMarcados()">🗑️</button>

    <script>
        const btnBorrar = document.getElementById('btn-borrar');
        const overlay = document.getElementById('pantalla-oscura');

        function mostrarVista(id) {
            document.getElementById('vista-login').classList.add('hidden');
            document.getElementById('vista-eden').classList.add('hidden');
            document.getElementById('vista-agenda').classList.add('hidden');
            btnBorrar.classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
            
            if (id === 'vista-agenda') {
                overlay.classList.add('hidden'); 
                btnBorrar.classList.remove('hidden');
            } else { overlay.classList.remove('hidden'); }
        }

        function validarAcceso() {
            const u = document.getElementById('user-in').value.trim();
            const p = document.getElementById('pass-in').value.trim();
            const savedPass = localStorage.getItem('user_' + u);
            if ((u === 'admin' && p === '1234') || (savedPass === p)) {
                mostrarVista('vista-agenda');
                cargarTareas();
            } else { alert("Error"); }
        }

        function cerrarSesion() { mostrarVista('vista-login'); }

        function ejecutarRegistro() {
            const u = document.getElementById('user-reg').value.trim();
            const p = document.getElementById('pass-reg').value.trim();
            if(u && p) {
                localStorage.setItem('user_' + u, p);
                alert("Registrado");
                mostrarVista('vista-login');
            }
        }

        function añadirTarea() {
            const input = document.getElementById('campo-tarea');
            if(input.value.trim()) {
                let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
                tareas.unshift({text: input.value.trim(), done: false}); 
                localStorage.setItem('tareas_eden', JSON.stringify(tareas));
                input.value = '';
                cargarTareas();
            }
        }

        function cargarTareas() {
            const lista = document.getElementById('lista-tareas');
            lista.innerHTML = '';
            let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
            tareas.forEach((t, i) => {
                const item = document.createElement('div');
                item.className = 'task-item';
                item.innerHTML = `
                    <input type="checkbox" style="width:20px; margin:0;" ${t.done ? 'checked' : ''} onchange="toggleTarea(${i})">
                    <div class="task-text" style="${t.done ? 'text-decoration:line-through; opacity:0.5;' : ''}">${t.text}</div>`;
                lista.appendChild(item);
            });
        }

        function toggleTarea(i) {
            let tareas = JSON.parse(localStorage.getItem('tareas_eden'));
            tareas[i].done = !tareas[i].done;
            localStorage.setItem('tareas_eden', JSON.stringify(tareas));
            cargarTareas();
        }

        function borrarMarcados() {
            let tareas = JSON.parse(localStorage.getItem('tareas_eden') || '[]');
            tareas = tareas.filter(t => !t.done);
            localStorage.setItem('tareas_eden', JSON.stringify(tareas));
            cargarTareas();
        }

        mostrarVista('vista-login');
    </script>
</body>
</html>
