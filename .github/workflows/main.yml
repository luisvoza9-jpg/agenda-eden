name: Build Flet APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flet
        run: pip install flet

      - name: Build APK
        run: |
          # Solo lanzamos el build porque ya estamos en la carpeta correcta
          flet build apk main.py
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mi-App-Instalador
          path: build/outputs/apk/release/app-release.apk
