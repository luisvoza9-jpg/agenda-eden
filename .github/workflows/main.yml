name: Build Flet APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install Flet
        run: pip install flet
      - name: Build APK
        run: |
          cd agenda-eden
          flet build apk main.py
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mi-App-Instalador
          path: agenda-eden/build/outputs/apk/release/app-release.apk

