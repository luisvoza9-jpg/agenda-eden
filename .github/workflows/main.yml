name: Build Flet APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install Flet
        run: pip install flet
      - name: Build APK
        run: |
          # Entramos en el laberinto: carpeta agenda-eden y luego carpeta main.py
          cd agenda-eden/main.py
          flet build apk main.py
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mi-App-Instalador
          # Buscamos el archivo en el fondo del laberinto
          path: agenda-eden/main.py/build/outputs/apk/release/app-release.apk
