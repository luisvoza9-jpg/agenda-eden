name: Build Flet APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install Flet
        run: |
          pip install flet
      - name: Build APK
        run: flet build apk pepe.py
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Mi-App-Instalador
          path: build/outputs/apk/release/app-release.apk
