name: Build Flet APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install Flet
        run: |
          pip install flet
      - name: Build APK
        run: |
          # Esto busca el archivo se llame como se llame y lo compila
          flet build apk $(find . -name "*.py" | head -n 1)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mi-App-Instalador
          path: build/outputs/apk/release/app-release.apk
