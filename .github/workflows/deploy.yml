name: Desplegar Agenda
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Esto le da permiso para crear la web
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python y Flet
        run: |
          pip install flet

      - name: Crear Web 
        run: |
          flet publish agenda_eden/main.py --base-url /agenda-eden/

      - name: Subir a GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
