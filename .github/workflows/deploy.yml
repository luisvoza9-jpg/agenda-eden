name: Desplegar Agenda
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python y Flet
        run: pip install flet

      - name: Crear Web (Forzado)
        run: |
          # Publicamos el archivo main.py directamente al nivel raíz de la web
          flet publish main.py --base-url /agenda-eden/

      - name: Subir a GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
